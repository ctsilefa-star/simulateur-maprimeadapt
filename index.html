<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulateur d'aides — Maintien à domicile · Vivalea</title>
  <meta name="description" content="Découvrez toutes vos aides pour adapter votre logement : MaPrimeAdapt', APA, PCH, crédit d'impôt, CARSAT… Simulation gratuite par Vivalea.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #F8F6F4; overflow-x: hidden; }
  </style>
  <script>
    // Auto-resize iframe — v2
    (function () {
      var lastHeight = 0;
      var MIN_HEIGHT = 600;
      function sendHeight() {
        var rootEl = document.getElementById('root');
        if (!rootEl) return;
        var h = Math.ceil(rootEl.getBoundingClientRect().height) + 60;
        if (h < MIN_HEIGHT) h = MIN_HEIGHT;
        if (Math.abs(h - lastHeight) > 12) {
          lastHeight = h;
          if (window.parent !== window) {
            window.parent.postMessage({ type: 'vivalea-resize', height: h }, '*');
          }
        }
      }
      var pollCount = 0;
      var pollInterval = setInterval(function () {
        var rootEl = document.getElementById('root');
        if (rootEl && rootEl.children.length > 0) {
          clearInterval(pollInterval);
          sendHeight();
          if (typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(sendHeight).observe(rootEl);
          }
        }
        if (++pollCount > 50) clearInterval(pollInterval);
      }, 100);
      window.addEventListener('DOMContentLoaded', sendHeight);
      window.addEventListener('load', function () { setTimeout(sendHeight, 500); });
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONSTANTS ────────────────────────────────────────────────

const STEPS = [

];

const SITUATION_OPTIONS = [

  { value: "perte_legere", label: "Légère perte d'autonomie",         hint: "Autonomie globalement préservée, aide ponctuelle suffisante (correspond aux GIR 5-6)" },
  { value: "handicap",     label: "Situation de handicap reconnue",  hint: "Avec taux d'incapacité reconnu ou en cours de reconnaissance MDPH / PCH" },
  { value: "prevention",   label: "Prévention / anticipation",        hint: "Pas de perte d'autonomie notable — adapter par précaution ou sécuriser le logement" },
];

const OCCUPANTS_OPTIONS = ["1", "2", "3", "4", "5", "6+"];

// ── BARÈME FRANCE RÉNOV' (revenus très modestes / modestes) ──
// Source : france-renov.gouv.fr/bareme
const IDF_DEPTS = ["75","77","78","91","92","93","94","95"];

const BAREME = {
  horsidf: {
    veryModest: [17363, 25393, 30540, 35676, 40835],
    modest:     [22259, 32553, 39148, 45735, 52348],
    incVM: 5151, incM: 6598,
  },
  idf: {
    veryModest: [24031, 35270, 42357, 49455, 56580],
    modest:     [29253, 42933, 51564, 60208, 68877],
    incVM: 7116, incM: 8663,
  },
};

function getRevenusThresholds(occupants, dep) {
  const b = IDF_DEPTS.includes(String(dep)) ? BAREME.idf : BAREME.horsidf;
  const raw = occupants === "6+" ? 6 : parseInt(occupants, 10) || 1;
  const idx  = Math.min(raw - 1, 4);
  const extra = raw > 5 ? raw - 5 : 0;
  return {
    veryModest: b.veryModest[idx] + extra * b.incVM,
    modest:     b.modest[idx]     + extra * b.incM,
  };
}

function getIncomeOptions(occupants, dep) {
  const { veryModest, modest } = getRevenusThresholds(occupants, dep);
  const fmtVM = veryModest.toLocaleString("fr-FR");
  const fmtM  = modest.toLocaleString("fr-FR");
  return [
    { value: "very_modest", label: `Inférieur à ${fmtVM} €` },
    { value: "modest",      label: `Entre ${fmtVM} € et ${fmtM} €` },
    { value: "above",       label: `Supérieur à ${fmtM} €` },
  ];
}

// Fallback pour affichages qui n'ont pas encore occupants/dep
const INCOME_OPTIONS = getIncomeOptions("1", "");

const PROFIL_OPTIONS = [
  { value: "retraite",      label: "Retraité(e)" },
  { value: "salarie",       label: "Salarié(e) — secteur privé" },
  { value: "fonctionnaire", label: "Fonctionnaire / secteur public" },
  { value: "autre",         label: "Autre / sans activité" },
];

const SOURCE_OPTIONS = [
  "Recherche Google", "Réseaux sociaux", "Bouche à oreille",
  "Professionnel de santé", "Mairie / CCAS", "Autre",
];

const NIVEAU_CONFIG = {
  fort:  { color: "#059669", bg: "#ECFDF5", label: "ÉLIGIBLE" },
  moyen: { color: "#E9552E", bg: "#FFF1E4", label: "PROBABLE" },
  info:  { color: "#3B82F6", bg: "#EFF6FF", label: "APPLICABLE" },
  non:   { color: "#9CA3AF", bg: "#F3F4F6", label: "NON ÉLIGIBLE" },
};

const RECIPIENT_EMAIL = "lea@vivalea.fr";

// ── AIDES LOCALES PAR DÉPARTEMENT ───────────────────────────

function getLocalAideInfo(dep) {
  const n = parseInt(dep, 10) || 0;

  if (dep === "75") return {
    organisms: "DASES · Paris Habitat",
    description: "La Ville de Paris propose une aide à l'adaptation via le dispositif PAPA (Programme d'Adaptation du logement des Personnes Agées). Cumulable avec les aides nationales.",
    contact: "dases.paris.fr · 01 40 28 40 28",
    montantLocal: "jusqu'à 10 000 €",
  };
  if ([77, 78, 91, 92, 93, 94, 95].includes(n)) return {
    organisms: "Conseil Départemental + Commune + ANAH locale",
    description: `Le département (${dep}) et les communes franciliennes disposent d'aides complémentaires pour l'adaptation du logement. Île-de-France Énergies accompagne aussi certains travaux.`,
    contact: "Votre CCAS communal · iledefrance-energies.fr",
    montantLocal: "Variable selon commune",
  };
  if (dep === "69") return {
    organisms: "Métropole de Lyon · Conseil Départemental du Rhône",
    description: "La Métropole de Lyon propose des aides à l'adaptation via son programme Réhabilitation Habitat, en complément des dispositifs nationaux.",
    contact: "grandlyon.com · rhone.fr",
    montantLocal: "jusqu'à 3 000 €",
  };
  if (dep === "13") return {
    organisms: "Métropole Aix-Marseille-Provence · PACT 13",
    description: "La Métropole AMP et le PACT 13 accompagnent les projets d'adaptation dans le cadre du programme local Habiter Mieux.",
    contact: "pact-amsm.org · metropoleapm.fr",
    montantLocal: "Variable",
  };
  if (dep === "59") return {
    organisms: "MEL (Métropole Europ. de Lille) · Conseil Dép. du Nord",
    description: "La MEL et le Département du Nord proposent des aides complémentaires pour l'adaptation du logement des seniors et personnes handicapées.",
    contact: "lillemetropole.fr · lenord.fr",
    montantLocal: "Variable",
  };
  if (dep === "33") return {
    organisms: "Bordeaux Métropole · Conseil Départemental Gironde",
    description: "Bordeaux Métropole et la Gironde accompagnent les projets d'adaptation en partenariat avec l'ANAH locale et les CCAS du territoire.",
    contact: "bordeaux-metropole.fr · gironde.fr",
    montantLocal: "Variable",
  };
  if (dep === "31") return {
    organisms: "Toulouse Métropole · Conseil Dép. Haute-Garonne",
    description: "Toulouse Métropole et le Département proposent des dispositifs complémentaires pour l'amélioration et l'adaptation du logement.",
    contact: "toulouse-metropole.fr · haute-garonne.fr",
    montantLocal: "Variable",
  };
  if (dep === "67") return {
    organisms: "Eurométropole de Strasbourg · ADIL 67",
    description: "L'Eurométropole de Strasbourg et l'ADIL 67 conseillent et accompagnent les projets d'adaptation du logement.",
    contact: "strasbourg.eu · adil67.org",
    montantLocal: "Variable",
  };
  if (dep === "06") return {
    organisms: "Métropole Nice Côte d'Azur · CRAM Prov.-Alpes",
    description: "La Métropole NCA propose des aides à l'amélioration de l'habitat pour les résidents âgés ou handicapés du territoire.",
    contact: "metropole.nice.fr",
    montantLocal: "Variable",
  };
  if (dep === "44") return {
    organisms: "Nantes Métropole Habitat · Conseil Dép. Loire-Atlantique",
    description: "Nantes Métropole et le Département proposent des aides à l'adaptation en complément des dispositifs nationaux.",
    contact: "nantesmetropole.fr · loire-atlantique.fr",
    montantLocal: "Variable",
  };
  if (dep === "38") return {
    organisms: "Grenoble Alpes Métropole · Conseil Dép. Isère",
    description: "La Métropole grenobloise et le Département disposent de programmes d'aide à l'adaptation et l'amélioration de l'habitat.",
    contact: "grenoble-alpes-metropole.fr · isere.fr",
    montantLocal: "Variable",
  };
  if (dep === "34") return {
    organisms: "Montpellier Méditerranée Métropole · Hérault",
    description: "La Métropole de Montpellier et le Département de l'Hérault proposent des aides complémentaires pour l'adaptation du logement.",
    contact: "montpellier3m.fr · herault.fr",
    montantLocal: "Variable",
  };
  if (dep === "76") return {
    organisms: "Métropole Rouen Normandie · Conseil Dép. Seine-Maritime",
    description: "La Métropole rouennaise accompagne l'adaptation du logement dans le cadre de son programme habitat.",
    contact: "metropole-rouen-normandie.fr",
    montantLocal: "Variable",
  };
  if (dep === "57") return {
    organisms: "Eurométropole de Metz · Moselle",
    description: "L'Eurométropole de Metz et le Conseil Départemental de la Moselle proposent des aides locales à l'adaptation.",
    contact: "eurometropole-metz.fr · moselle.fr",
    montantLocal: "Variable",
  };
  if (n >= 971 && n <= 976) return {
    organisms: "DEAL · ANAH Outre-Mer · Collectivité Territoriale",

  return {

    contact: "Votre CCAS de mairie + ANAH délégation territoriale (anah.fr)",
    montantLocal: "Variable selon commune",
  };
}

// ── MOTEUR D'ÉLIGIBILITÉ ─────────────────────────────────────

function computeAides(data) {
  // ── Âge ──────────────────────────────────────────────────────
  const age70plus  = data.age === "70_plus";
  const age6069    = data.age === "60_69";
  const age60plus  = age70plus || age6069;           // ≥ 60 ans (toutes tranches)
  const ageLess60  = data.age === "less_60";

  // ── Situation ────────────────────────────────────────────────
  const situationSevere  = data.situation === "perte_severe";
  const situationLegere  = data.situation === "perte_legere";
  const isHandicap       = data.situation === "handicap";
  const isPrevention     = data.situation === "prevention";

  // ── Statut logement ──────────────────────────────────────────
  const isProprietaire   = data.statut === "proprietaire_occupant";
  const isBailleur       = data.statut === "proprietaire_bailleur";
  const isLocatairePrive = data.statut === "locataire_prive";
  const isLocataireHLM   = data.statut === "locataire_social";

  // ── Revenus ──────────────────────────────────────────────────
  const revenusTresModeste = data.revenus === "very_modest";
  const revenusModeste     = data.revenus === "modest";
  const revenusAudessus    = data.revenus === "above";

  // ── Profil ───────────────────────────────────────────────────
  const isRetraite = data.profil === "retraite";
  const isSalarie  = data.profil === "salarie";

  const aides = [];

  // ══════════════════════════════════════════════════════════
  //  SECTION A — SERVICES & AIDE À DOMICILE
  // ══════════════════════════════════════════════════════════

  // A1. APA — Plan d'aide services à domicile
  // Éligible GIR 1-4 (perte sévère) ≥ 60 ans
  if (age60plus && situationSevere) {
    aides.push({
      id: "apa_services", nom: "APA — Services à domicile", organisme: "Conseil Départemental",
      categorie: "services",
      eligible: true, niveau: revenusTresModeste ? "fort" : "moyen",
      montantMax: revenusTresModeste ? 18000 : 12000,  // annualisé indicatif
      montantLabel: "jusqu'à 2 034 €/mois (GIR 1, 2026)",
      taux: "Selon GIR 1-4 et participation sur revenus — revalorisé jan. 2026",
      description: "L'APA à domicile finance un plan d'aide mensuel : auxiliaire de vie, aide ménagère, portage de repas, téléassistance, accueil de jour. Versée par le Conseil Départemental. Votre participation varie selon vos revenus. Montants 2026 : GIR 1 = 2 034 €/mois · GIR 2 = 1 666 €/mois · GIR 3 = 1 248 €/mois · GIR 4 = 830 €/mois.",
      condition: "GIR 1 à 4 — perte d'autonomie modérée à totale — ≥ 60 ans",
    });
  } else if (age60plus && situationLegere) {
    // GIR 5-6 : pas éligible APA mais peut bénéficier de l'aide CARSAT (voir section C)
    aides.push({
      id: "apa_services", nom: "APA — Services à domicile", organisme: "Conseil Départemental",
      categorie: "services",
      eligible: false, niveau: "non", montantMax: 0, montantLabel: "Non applicable",
      taux: "",
      description: "L'APA services nécessite un niveau de perte d'autonomie GIR 1 à 4. En GIR 5-6, des aides alternatives existent via votre caisse de retraite (CARSAT) et votre commune (CCAS).",
      condition: "GIR 5-6 : se renseigner auprès du CCAS ou de la CARSAT",
    });
  }

  // A2. PCH — Aide humaine (auxiliaire de vie / aidant familial)
  if (isHandicap) {
    if (!age60plus) {
      aides.push({
        id: "pch_humain", nom: "PCH — Aide humaine", organisme: "MDPH",
        categorie: "services",
        eligible: true, niveau: "fort", montantMax: 20400,  // ~1700€/mois × 12
        montantLabel: "jusqu'à 1 700 €/mois",
        taux: "100 % des dépenses dans la limite du plafond horaire",
        description: "La PCH aide humaine (volet 1) finance les heures d'auxiliaire de vie ou dédommage un aidant familial. Elle couvre aussi l'astreinte nocturne et les soins spécifiques liés au handicap.",
        condition: "Difficulté absolue pour ≥ 1 acte essentiel, ou grave pour ≥ 2 — < 60 ans",
      });
    } else {
      aides.push({
        id: "pch_humain", nom: "PCH — Aide humaine (maintien)", organisme: "MDPH",
        categorie: "services",
        eligible: true, niveau: "moyen", montantMax: 20400,
        montantLabel: "jusqu'à 1 700 €/mois",
        taux: "Si droits PCH ouverts avant 60 ans",
        description: "La PCH aide humaine peut être maintenue après 60 ans si les droits ont été ouverts avant cet âge ou si la personne est encore en activité professionnelle. À vérifier auprès de la MDPH.",
        condition: "Handicap reconnu avant 60 ans — droits à maintenir auprès de la MDPH",
      });
    }
  }

  // A3. Crédit d'impôt services à la personne (CIAP)
  // 50 % des dépenses, plafond 12 000 € (→ max 6 000 €/an). Accessible à TOUS sans conditions.
  {
    const accessible = age60plus || isHandicap || situationSevere || situationLegere;
    aides.push({
      id: "credit_impot_services", nom: "Crédit d'impôt services à la personne", organisme: "Finances Publiques",
      categorie: "services",
      eligible: accessible, niveau: accessible ? "moyen" : "non",
      montantMax: accessible ? 6000 : 0,
      montantLabel: accessible ? "jusqu'à 6 000 €/an" : "Non applicable",
      taux: "50 % des dépenses de services à domicile (plafond 12 000 €)",
      description: "Crédit d'impôt de 50 % sur les dépenses d'aide à domicile : auxiliaire de vie, ménage, garde malade, portage de repas, téléassistance… Remboursé même sans impôt à payer. Sans conditions de revenus.",
      condition: "Contribuable ou non-imposable — applicable à toutes les aides à domicile agréées",
    });
  }

  // A4. Téléassistance
  if (age60plus || isHandicap || situationSevere) {
    aides.push({
      id: "teleassistance", nom: "Téléassistance 24h/24", organisme: "APA · CARSAT · CCAS · Mutuelle",
      categorie: "services",
      eligible: true, niveau: "info", montantMax: 0,
      montantLabel: "Prise en charge totale ou partielle",
      taux: "~20 à 30 €/mois — finançable via APA ou CARSAT",
      description: "La téléassistance (bouton d'alarme, détecteur de chute) peut être intégrée au plan d'aide APA ou financée par la caisse de retraite, le CCAS ou la mutuelle. Ouvre droit au crédit d'impôt services à la personne.",
      condition: "Toute personne âgée ou en situation de handicap à domicile",
    });
  }

  // A5. CARSAT — Aide à domicile & prévention (retraités + personnes ayant cotisé)
  if (isRetraite || data.profil === "autre") {
    aides.push({
      id: "carsat", nom: "Aides CARSAT / Caisse de retraite", organisme: "CARSAT · MSA · CNAV",
      categorie: "services",
      eligible: true, niveau: situationLegere ? "moyen" : "info",
      montantMax: situationLegere ? 3500 : 0,
      montantLabel: situationLegere ? "jusqu'à 3 500 €" : "Variable selon caisse",
      taux: "Selon ressources et caisse de retraite",
      description: "Votre caisse de retraite peut financer : aide à domicile (GIR 5-6 hors APA), portage de repas, téléassistance, adaptation du logement, accueil de jour. Le plan d'action personnalisé (PAP) recense toutes les aides disponibles.",
      condition: "Retraité(e) ou personne ayant cotisé à une caisse de retraite — GIR 5-6 en priorité",
    });
  }

  // A6. ARDH — Aide au Retour à Domicile après Hospitalisation
  if (isRetraite || data.profil === "autre") {
    const postHosti = data.chute_hospi === "oui";
    aides.push({
      id: "ardh", nom: "ARDH — Aide au Retour à Domicile", organisme: "CNAV / CARSAT",
      categorie: "services",
      eligible: true, niveau: postHosti ? "fort" : "info",
      montantMax: postHosti ? 1800 : 0,
      montantLabel: "jusqu'à 1 800 €",
      taux: "Plan d'aide d'urgence sur 3 mois · déclenchable dès la sortie d'hospitalisation",
      description: "Dès la sortie d'hospitalisation, votre caisse de retraite peut financer un plan d'aide d'urgence : aide ménagère, portage de repas, téléassistance, garde à domicile temporaire. À demander à votre CARSAT dans les 48 h suivant le retour à domicile.",
      condition: "Retraité(e) régime général ou agricole — à déclencher dès la sortie d'hôpital",
    });
  }

  // A7. AAH — Allocation Adultes Handicapés
  if (isHandicap) {
    const aahElig      = ageLess60;
    const aahMaintien  = age6069;
    aides.push({
      id: "aah", nom: "AAH — Allocation Adultes Handicapés", organisme: "CAF / MSA",
      categorie: "services",
      eligible: aahElig || aahMaintien, niveau: aahElig ? "fort" : aahMaintien ? "moyen" : "non",
      montantMax: (aahElig || aahMaintien) ? 12400 : 0,  // 1 033 € × 12, indicatif
      montantLabel: "1 033 €/mois (2026)",
      taux: "Taux incapacité ≥ 80 % (ou 50-80 % + restriction emploi)",
      description: "Allocation mensuelle versée par la CAF aux personnes dont le taux d'incapacité est reconnu par la MDPH. Cumulable avec la PCH. Montant 2026 : 1 033,32 €/mois. À partir de 62 ans, transformation progressive en pension de retraite selon les droits acquis.",
      condition: ageLess60
        ? "Moins de 60 ans · Taux incapacité ≥ 80 % ou 50-80 % + restriction d'emploi — MDPH"
        : age6069
          ? "60-69 ans · Maintien possible si droits ouverts avant 60 ans — à confirmer CAF"
          : "Non applicable (≥ 70 ans — retraite de substitution)",
    });
  }

  // A8. AJPA — Allocation Journalière du Proche Aidant
  // Toujours affiché : fort si aidant confirmé, info sinon (applicable à tous)
  {
    const aidantOui = data.aidant === "oui";
    aides.push({
      id: "ajpa", nom: "AJPA — Allocation Journalière Proche Aidant", organisme: "CAF / MSA",
      categorie: "services",
      eligible: true,
      niveau: aidantOui ? "fort" : "info",
      montantMax: aidantOui ? 4399 : 0,
      montantLabel: aidantOui ? "66,64 €/jour (max 66 jours)" : "66,64 €/jour — si un proche réduit son activité",
      taux: "Pendant le congé de proche aidant · jusqu'à 264 jours cumulés sur la vie",
      description: "Si un proche (conjoint, enfant, parent…) réduit ou suspend son activité professionnelle pour vous accompagner, il peut percevoir l'AJPA. Versée par la CAF ou la MSA, elle compense partiellement la perte de revenus. Durée max : 66 jours par aidé (264 jours sur 4 proches différents).",
      condition: "Aidant salarié ou indépendant · Versée sur 66 jours max par proche · CAF ou MSA",
    });
  }

  // A9. Aide ménagère CCAS (GIR 5-6 hors APA, ou prévention)
  if (age60plus && (situationLegere || isPrevention)) {
    aides.push({
      id: "aide_menagere_ccas", nom: "Aide ménagère — CCAS / Département", organisme: "CCAS · Conseil Départemental",
      categorie: "services",
      eligible: true, niveau: "moyen",
      montantMax: 1200,
      montantLabel: "Variable (selon revenus et commune)",
      taux: "Quelques heures/semaine · sous conditions de revenus",
      description: "Votre mairie (CCAS) et le Conseil Départemental proposent une aide-ménagère sociale pour les personnes âgées en GIR 5-6 ou en prévention, non éligibles à l'APA. Elle finance ménage, courses et aide à la préparation des repas. Premier contact : CCAS de votre mairie.",
      condition: "≥ 60 ans · GIR 5-6 ou prévention · Conditions de revenus définies par le département",
    });
  }

  // A10. Portage de repas
  if (age60plus || isHandicap || situationSevere) {
    aides.push({
      id: "portage_repas", nom: "Portage de repas à domicile", organisme: "CCAS · APA · CARSAT",
      categorie: "services",
      eligible: true, niveau: "info",
      montantMax: 0,
      montantLabel: "~8 à 15 €/repas · finançable via APA ou CCAS",
      taux: "Prise en charge partielle ou totale selon revenus et plan d'aide",
      description: "Livraison de repas équilibrés à domicile 5 à 7 j/semaine. Finançable via le plan APA (volet services), le CCAS de la mairie, la CARSAT ou le crédit d'impôt services à la personne (50 %). Votre CCAS référence les prestataires locaux.",
      condition: "Toute personne âgée ou en perte d'autonomie — premier contact : CCAS de mairie",
    });
  }

  // ══════════════════════════════════════════════════════════
  //  SECTION B — ADAPTATION DU LOGEMENT
  // ══════════════════════════════════════════════════════════

  // B1. MaPrimeAdapt'
  if (isBailleur) {
    const locataireEligible = situationSevere || isHandicap;
    if (locataireEligible) {
      aides.push({
        id: "maprimeadapt", nom: "MaPrimeAdapt' — Bailleur", organisme: "ANAH / État",
        categorie: "logement",
        eligible: true, niveau: "moyen", tauxBadge: "35 %", montantMax: 21000,
        montantLabel: "jusqu'à 21 000 €",
        taux: "35 % des travaux HT (plafond 750 €/m² × 80 m²)",
        description: "En tant que propriétaire bailleur, vous pouvez financer les travaux d'adaptation pour votre locataire en perte d'autonomie. Conventionnement ANAH obligatoire 6 ans minimum. AMO Vivalea obligatoire.",
        condition: "Locataire avec GIR attesté, incapacité ≥ 50 % ou PCH",
      });
    } else {
      aides.push({
        id: "maprimeadapt", nom: "MaPrimeAdapt' — Bailleur", organisme: "ANAH / État",
        categorie: "logement",
        eligible: false, niveau: "non", montantMax: 0, montantLabel: "Conditions à vérifier",
        taux: "",
        description: "Réservée aux bailleurs dont le locataire présente une perte d'autonomie (GIR), un taux d'incapacité ≥ 50 % ou bénéficie de la PCH.",
        condition: "Situation du locataire à préciser",
      });
    }
  } else if ((isProprietaire || isLocatairePrive) && !revenusAudessus) {
    let niveauMPA = "fort";
    let conditionMPA = "";
    let eligibleMPA = true;
    const taux    = revenusTresModeste ? 70 : 50;
    const montant = revenusTresModeste ? 22000 : 14000;

    if (age70plus) {
      // ≥ 70 ans → éligible directement
      niveauMPA    = revenusTresModeste ? "fort" : "moyen";
      conditionMPA = `≥ 70 ans · Revenus ${revenusTresModeste ? "très modestes" : "modestes"}`;
    } else if (age6069) {
      // 60-69 ans : toute perte d'autonomie (légère ou sévère) ou handicap reconnu → ÉLIGIBLE
      if (situationSevere || situationLegere || isHandicap) {
        niveauMPA    = revenusTresModeste ? "fort" : "moyen";
        const situLabel = situationSevere ? "perte d'autonomie sévère (GIR 1-4)"
          : situationLegere ? "perte d'autonomie (GIR 5-6)"
          : "handicap reconnu (PCH)";
        conditionMPA = `60-69 ans · ${situLabel} · Revenus ${revenusTresModeste ? "très modestes" : "modestes"}`;
      } else {
        // Prévention seule → probable (une consultation médicale pour GIR peut ouvrir les droits)
        niveauMPA    = "moyen";
        conditionMPA = "60-69 ans · Prévention — une évaluation GIR par le médecin traitant peut ouvrir l'éligibilité";
      }
    } else if (ageLess60) {
      // < 60 ans : handicap reconnu OU perte sévère (GIR 1 implique éligibilité directe)
      if (isHandicap || situationSevere) {
        niveauMPA    = revenusTresModeste ? "fort" : "moyen";
        conditionMPA = isHandicap
          ? "< 60 ans · Handicap reconnu (PCH ou taux incapacité ≥ 50 %)"
          : "< 60 ans · Perte d'autonomie sévère (GIR 1) · PCH ou évaluation MDPH";
      } else {
        // Légère ou prévention → non éligible
        eligibleMPA  = false;
      }
    }

    if (eligibleMPA) {
      aides.push({
        id: "maprimeadapt", nom: "MaPrimeAdapt'", organisme: "ANAH / État",
        categorie: "logement",
        eligible: true, niveau: niveauMPA, montantMax: montant,
        montantLabel: `jusqu'à ${montant.toLocaleString("fr-FR")} €`,
        taux: `${taux} % des travaux HT · AMO Vivalea obligatoire`,
        description: `Aide nationale pour les travaux d'adaptation du logement (salle de bain, escaliers, circulations…). Prise en charge à ${taux} % du montant HT. L'accompagnement par un AMO agréé ANAH (Vivalea) est obligatoire pour constituer et déposer le dossier.`,
        condition: conditionMPA,
      });
    } else {
      aides.push({
        id: "maprimeadapt", nom: "MaPrimeAdapt'", organisme: "ANAH / État",
        categorie: "logement",
        eligible: false, niveau: "non", montantMax: 0, montantLabel: "Non éligible",
        taux: "",
        description: "Réservée aux personnes ≥ 70 ans, aux 60-69 ans avec GIR, ou aux personnes handicapées (PCH / incapacité ≥ 50 %).",
        condition: "Conditions d'âge ou de handicap non remplies",
      });
    }
  } else {
    const raison = revenusAudessus
      ? "Revenus dépassant les plafonds ANAH"
      : isLocataireHLM
        ? "Locataires de logement social (HLM) non éligibles à MaPrimeAdapt'"
        : `Statut "${HOUSING_OPTIONS.find(o => o.value === data.statut)?.label || "inconnu"}" non éligible`;
    aides.push({
      id: "maprimeadapt", nom: "MaPrimeAdapt'", organisme: "ANAH / État",
      categorie: "logement",
      eligible: false, niveau: "non", montantMax: 0, montantLabel: "Non éligible",
      taux: "",
      description: isLocataireHLM
        ? "MaPrimeAdapt' ne s'applique pas aux logements HLM. Renseignez-vous auprès de votre bailleur social."
        : "Réservée aux propriétaires occupants et locataires du parc privé avec revenus modestes.",
      condition: raison,
    });
  }

  // B2. APA — Volet adaptation du logement
  if (age60plus && (situationSevere || situationLegere)) {
    const montant = situationSevere ? 7000 : 3500;
    aides.push({
      id: "apa_logement", nom: "APA — Adaptation du logement", organisme: "Conseil Départemental",
      categorie: "logement",
      eligible: true, niveau: situationSevere ? "fort" : "moyen",
      montantMax: montant,
      montantLabel: `jusqu'à ${montant.toLocaleString("fr-FR")} €`,
      taux: "Selon GIR et revenus — intégré au plan d'aide APA",
      description: "Le plan d'aide APA peut inclure un volet « adaptation du logement » pour financer du matériel ou des petits travaux en complément de MaPrimeAdapt'. Peut aussi financer des aides techniques (barres, rampes, siège de bain…).",
      condition: situationSevere ? "GIR 1 à 4 — ≥ 60 ans" : "GIR 5-6 — ≥ 60 ans",
    });
  }

  // B3. PCH — Aménagement du logement
  if (isHandicap) {
    if (!age60plus) {
      aides.push({
        id: "pch_logement", nom: "PCH — Aménagement du logement", organisme: "MDPH",
        categorie: "logement",
        eligible: true, niveau: "fort", montantMax: 10000,
        montantLabel: "jusqu'à 10 000 €",
        taux: "100 % dans la limite du plafond",
        description: "La PCH volet logement (volet 3) prend en charge les travaux d'accessibilité et d'adaptation : douche de plain-pied, élargissement de portes, monte-escalier… Cumulable avec MaPrimeAdapt' si éligible.",
        condition: "Difficulté absolue pour ≥ 1 acte essentiel — < 60 ans (ou maintien de droits)",
      });
    } else {
      aides.push({
        id: "pch_logement", nom: "PCH — Aménagement du logement (maintien)", organisme: "MDPH",
        categorie: "logement",
        eligible: true, niveau: "moyen", montantMax: 10000,
        montantLabel: "jusqu'à 10 000 €",
        taux: "Si droits ouverts avant 60 ans",
        description: "La PCH volet logement peut être maintenue après 60 ans si les droits ont été ouverts avant cet âge. À confirmer avec la MDPH.",
        condition: "Handicap reconnu avant 60 ans — à vérifier avec la MDPH",
      });
    }
  }

  // B3b. PCH — Aides techniques (volet 2) : matériel adapté
  if (isHandicap) {
    aides.push({
      id: "pch_techniques", nom: "PCH — Aides techniques (matériel)", organisme: "MDPH",
      categorie: "logement",
      eligible: true, niveau: !age60plus ? "fort" : "moyen",
      montantMax: 13200,
      montantLabel: "jusqu'à 13 200 € sur 10 ans",
      taux: "100 % dans la limite du plafond · renouvellement selon durée de vie",
      description: "La PCH volet 2 finance l'achat ou la location de matériel adapté : lit médicalisé, verticalisateur, matelas anti-escarres, fauteuil de bain, matériel domotique… Depuis décembre 2025, les fauteuils roulants sont pris en charge à 100 % directement par l'Assurance Maladie (sans rester à charge).",
      condition: !age60plus
        ? "Handicap reconnu MDPH · Moins de 60 ans"
        : "Handicap reconnu avant 60 ans — maintien des droits PCH à confirmer avec la MDPH",
    });
  }

  // B4. Crédit d'impôt équipements d'adaptation
  if (age60plus || situationSevere || situationLegere || isHandicap) {
    const estAlternativePrincipale = !((isProprietaire || isLocatairePrive) && !revenusAudessus);
    aides.push({
      id: "credit_impot", nom: "Crédit d'impôt équipements d'adaptation", organisme: "Finances Publiques",
      categorie: "logement",
      eligible: true, niveau: estAlternativePrincipale ? "fort" : "moyen",
      montantMax: 2500,
      montantLabel: "jusqu'à 2 500 €",
      taux: "25 % des dépenses (plafond 5 000 € / personne)",
      description: estAlternativePrincipale
        ? "En l'absence de MaPrimeAdapt', le crédit d'impôt est une aide directe pour financer barres d'appui, douche adaptée, lit médicalisé… Valable pour tous les niveaux de revenus."
        : "Crédit d'impôt pour équipements conçus pour personnes âgées ou handicapées (art. 200 quater A CGI) : barres, cabine de douche adaptée, monte-escalier…",
      condition: "Propriétaires et locataires — aucune condition de revenus",
    });
  }

  // B5. TVA réduite
  aides.push({
    id: "tva", nom: "TVA à taux réduit — 10 %", organisme: "État",
    categorie: "logement",
    eligible: true, niveau: "info", montantMax: 0,
    montantLabel: "Économie directe sur facture artisan",
    taux: "10 % (adaptation) ou 5,5 % (énergie) au lieu de 20 %",
    description: "TVA réduite sur les travaux d'amélioration et d'adaptation pour personnes âgées ou handicapées. Appliquée directement par l'artisan sur le devis.",
    condition: "Logement achevé depuis plus de 2 ans — résidence principale ou secondaire",
  });

  // B6. Loc'Avantages
  if (isBailleur) {
    aides.push({
      id: "loc_avantages", nom: "Loc'Avantages", organisme: "ANAH / Fisc",
      categorie: "logement",
      eligible: true, niveau: "info", montantMax: 0,
      montantLabel: "Réduction fiscale 15 % à 65 %",
      taux: "Sur loyers perçus, selon niveau de conventionnement",
      description: "Conventionnement ANAH couplé à MaPrimeAdapt' bailleur : réduction d'impôt de 15 à 65 % sur les loyers perçus selon le niveau Loc1/2/3. Engagement minimum 6 ans.",
      condition: "Logement non meublé loué à titre de résidence principale — DPE ≥ E exigé",
    });
  }

  // ══════════════════════════════════════════════════════════
  //  SECTION C — AIDES COMPLÉMENTAIRES
  // ══════════════════════════════════════════════════════════

  // C1. Action Logement — exclusivement pour salariés secteur privé (non éligible retraités)
  if (isSalarie) {
    aides.push({
      id: "action_logement", nom: "Prêt Action Logement — 0 %", organisme: "Action Logement",
      categorie: "complementaire",
      eligible: true, niveau: "info", montantMax: 0,
      montantLabel: "Prêt jusqu'à 10 000 € (0 %)",
      taux: "Prêt à taux zéro — reste à charge travaux",
      description: "Prêt sans intérêts pour couvrir le reste à charge des travaux d'adaptation ou d'accessibilité non couverts par les subventions.",
      condition: "Salarié(e) du secteur privé — entreprise cotisant à Action Logement",
    });
  }


  // C3. Remboursement fauteuil roulant 100 % (depuis déc. 2025)
  if (isHandicap || situationSevere) {
    aides.push({
      id: "remboursement_am", nom: "Fauteuil roulant — Remboursement 100 %", organisme: "Assurance Maladie",
      categorie: "complementaire",
      eligible: true, niveau: "info",
      montantMax: 0,
      montantLabel: "100 % remboursé (réforme déc. 2025)",
      taux: "Sur prescription médicale ou d'ergothérapeute — sans reste à charge",
      description: "Depuis le 1er décembre 2025, tous les fauteuils roulants (manuel, électrique, modulaire, sportif) sont intégralement pris en charge par l'Assurance Maladie, sans aucun reste à charge. Sur prescription d'un médecin ou d'un ergothérapeute. Délai de réponse AM : 2 mois max.",
      condition: "Sur prescription médicale — Assuré social — Tout type de fauteuil roulant",
    });
  }

  // C4. Aides locales & territoriales
  const localInfo = getLocalAideInfo(data.departement || "");
  aides.push({
    id: "aides_locales", nom: "Aides locales & territoriales",
    organisme: localInfo.organisms,
    categorie: "complementaire",
    eligible: true, niveau: "info", montantMax: 0,
    montantLabel: localInfo.montantLocal,
    taux: "Complémentaires aux aides nationales",
    description: localInfo.description,
    condition: `Contact : ${localInfo.contact}`,
  });

  // ── Totaux séparés par catégorie ─────────────────────────
  const elig = a => a.eligible && (a.niveau === "fort" || a.niveau === "moyen");

  // Logement : subventions ponctuelles (en €, cumulables)
  const totalLogement = aides
    .filter(a => a.categorie === "logement" && elig(a))
    .reduce((s, a) => s + a.montantMax, 0);

  // Services : aides mensuelles/récurrentes → on ne cumule pas, on compte et on identifie la principale
  const nbServicesElig = aides.filter(a => a.categorie === "services" && elig(a)).length;
  const topServiceAide = aides.find(a => a.categorie === "services" && elig(a));

  return { aides, totalLogement, nbServicesElig, topServiceAide };
}

// ── COMPONENTS ──────────────────────────────────────────────

function ProgressBar({ step }) {
  return (
    <>
      <div style={S.progressBar}>
        {STEPS.map((s, i) => (
          <React.Fragment key={s.id}>
            <div style={S.progressDot(i === step, i < step)} />
            {i < STEPS.length - 1 && <div style={S.progressLine(i < step)} />}
          </React.Fragment>
        ))}
      </div>
      <div style={S.progressLabels}>
        {STEPS.map((s, i) => (
          <div key={s.id} style={S.progressLabel(i === step || i < step)}>{s.label}</div>
        ))}
      </div>
    </>
  );
}

function OptionButton({ label, hint, selected, onClick, center }) {
  return (
    <button
      onClick={onClick}
      style={{ ...S.optionBtn(selected), ...(center ? { justifyContent: "center" } : {}) }}
      onMouseEnter={e => { if (!selected) e.currentTarget.style.borderColor = "#6B7280"; }}
      onMouseLeave={e => { if (!selected) e.currentTarget.style.borderColor = "#E8E2DD"; }}
    >
      <div style={S.radio(selected)}>
        {selected && <div style={S.radioDot} />}
      </div>
      <div>
        <div>{label}</div>
        {hint && <div style={{ fontSize: 12, color: "#6B7280", fontWeight: 400, marginTop: 2 }}>{hint}</div>}
      </div>
    </button>
  );
}

// Carte hero MaPrimeAdapt' (pleine largeur, mise en avant)
function MaPrimeAdaptHero({ aide, allAides }) {
  const cfg = NIVEAU_CONFIG[aide.niveau] || NIVEAU_CONFIG.non;
  const isEligible = aide.niveau === "fort" || aide.niveau === "moyen";
  const taux = aide.tauxBadge || (aide.niveau === "fort" ? "70 %" : aide.niveau === "moyen" ? "50 %" : null);

  // Montage alternatif : top 3 aides par montant décroissant quand non éligible
  const topAlternatives = !isEligible
    ? (allAides || [])
        .filter(a => a.id !== "maprimeadapt" && a.eligible && (a.niveau === "fort" || a.niveau === "moyen"))
        .sort((a, b) => b.montantMax - a.montantMax)
        .slice(0, 3)
    : [];
  const totalAlternatif = topAlternatives.reduce((s, a) => s + a.montantMax, 0);

  return (
    <div style={{
      border: `2px solid ${isEligible ? cfg.color : "#E8E2DD"}`,
      borderRadius: 14, padding: "18px 20px", marginBottom: 14,
      background: isEligible ? cfg.bg : "#F9FAFB",
    }}>
      {/* Badge + label */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
        <span style={{
          fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase",
          background: cfg.color, color: "#fff", padding: "3px 8px", borderRadius: 4,
        }}>{cfg.label}</span>
        <span style={{ fontSize: 10, color: "#6B7280", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase" }}>
          Aide principale · MaPrimeAdapt'
        </span>
      </div>

      {/* Corps */}
      <div style={{ textAlign: "center" }}>
        <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 22, color: "#18263F", lineHeight: 1.2, marginBottom: 2, display: "inline-flex", alignItems: "center", gap: 4 }}>
          MaPrimeAdapt'
          <TooltipInfo aideId="maprimeadapt" />
        </div>
        <div style={{ fontSize: 11, color: "#8F1349", fontWeight: 700, marginBottom: 8 }}>ANAH / État</div>
        <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.5, textAlign: "left", marginBottom: isEligible ? 12 : 4 }}>
          {aide.description}
        </div>
        {!isEligible && (
          <div style={{ fontSize: 11, color: "#9CA3AF", fontStyle: "italic", textAlign: "left" }}>{aide.condition}</div>
        )}
      </div>

      {isEligible && (
        <div style={{ textAlign: "center", marginTop: 4 }}>
          <div style={{
            width: 88, height: 88, borderRadius: "50%",
            background: cfg.color, display: "inline-flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center",
            boxShadow: `0 6px 18px ${cfg.color}50`,
          }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: "#fff", lineHeight: 1, fontFamily: "'DM Serif Display', serif" }}>{taux}</div>
            <div style={{ fontSize: 9, color: "rgba(255,255,255,0.85)", letterSpacing: "0.05em" }}>prise en charge</div>
          </div>
          <div style={{ fontSize: 15, fontWeight: 700, color: cfg.color, marginTop: 8 }}>
            {aide.montantLabel}
          </div>
          {aide.taux && <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 2 }}>{aide.taux}</div>}
        </div>
      )}

      {/* Montage alternatif (non-éligibles seulement) */}
      {!isEligible && topAlternatives.length > 0 && (
        <div style={{
          marginTop: 14, background: "#F0FDF4",
          border: "1.5px solid #86EFAC", borderRadius: 10, padding: "12px 14px",
        }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#059669", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>
            Montage alternatif recommandé
          </div>
          <div style={{ fontSize: 12, color: "#18263F", marginBottom: 10, lineHeight: 1.5 }}>
            Sans MaPrimeAdapt', vous pouvez combiner ces aides{totalAlternatif > 0 ? ` pour un potentiel de jusqu'à ${totalAlternatif.toLocaleString("fr-FR")} €` : ""} :
          </div>
          {topAlternatives.map((a, i) => {
            const c = NIVEAU_CONFIG[a.niveau];
            return (
              <div key={a.id} style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                paddingTop: i > 0 ? 7 : 0, marginTop: i > 0 ? 7 : 0,
                borderTop: i > 0 ? "1px solid #D1FAE5" : "none",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <span style={{ fontSize: 12, color: "#059669" }}>✓</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: "#18263F" }}>{a.nom}</span>
                </div>
                <span style={{ fontSize: 12, fontWeight: 700, color: c.color, whiteSpace: "nowrap" }}>{a.montantLabel}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SimulateurAides() {
  const [step,             setStep]             = useState(0);
  const [data,             setData]             = useState({});
  const [errors,           setErrors]           = useState({});
  const [showResults,      setShowResults]      = useState(false);  // affiche ResultScreen
  const [contactSubmitted, setContactSubmitted] = useState(false);  // formulaire contact soumis
  const [sending,          setSending]          = useState(false);
  const bodyRef          = useRef(null);
  const stepEntryValue   = useRef(null);
  const stepEntryAidant  = useRef(null);  // pour éviter auto-advance au retour étape 1

  const onChange = (field, value) => {
    setData(prev => ({ ...prev, [field]: value }));
    setErrors(prev => ({ ...prev, [field]: undefined }));
  };

  const canGoNext = () => {
    const deptValid = data.departement && /^(0[1-9]|[1-9][0-9]|2[AB]|97[1-6])$/i.test(data.departement);
    switch (step) {
      case 0: return !!data.age;
      case 1: return !!data.situation && (data.situation === "prevention" || !!data.aidant);
      case 2: return !!data.statut;
      case 3: return deptValid && !!data.occupants;  // foyer fusionné
      case 4: return !!data.revenus;
      case 5: return !!data.profil;
      case 6: return !!data.objectif;
      case 7: return !!data.nom && !!data.telephone && !!data.email &&
                     (data.isPartenaire
                       ? (!!data.partenaireEntreprise && !!data.partenaireNom)
                       : !!data.source);
      default: return false;
    }
  };

  const validateContact = () => {
    const errs = {};
    if (!data.nom?.trim())       errs.nom       = "Ce champ est obligatoire.";
    if (!data.telephone?.trim()) {
      errs.telephone = "Ce champ est obligatoire.";
    } else {
      const _t = data.telephone.trim().replace(/[\s.\-()+]/g, "");
      if (!/^(?:0033|33)?0?[67]\d{8}$/.test(_t)) errs.telephone = "Merci de saisir un numéro de portable (06 ou 07).";
    }
    if (!data.email?.trim())   errs.email  = "Ce champ est obligatoire.";
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) errs.email = "Email invalide.";
    if (!data.isPartenaire && !data.source) errs.source = "Ce champ est obligatoire.";
    // Consentement RGPD implicite au clic sur "Voir mes aides →"
    if (data.isPartenaire) {
      if (!data.partenaireEntreprise?.trim()) errs.partenaireEntreprise = "Ce champ est obligatoire.";
      if (!data.partenaireNom?.trim())        errs.partenaireNom        = "Ce champ est obligatoire.";
    }
    return errs;
  };

  const handleSubmit = async () => {
    const errs = validateContact();
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }

    // Affiche les résultats immédiatement — email part en arrière-plan
    setContactSubmitted(true);
    setShowResults(true);

    const { aides, totalLogement: totalLog } = computeAides(data);
    const mpa = aides.find(a => a.id === "maprimeadapt");

    // Aides à envoyer : fort + moyen + info (tout ce qui est visible dans les résultats)
    const aidesVisibles = aides.filter(a => a.eligible && a.niveau !== "non");
    const aidesEligibles = aidesVisibles.filter(a => a.niveau === "fort" || a.niveau === "moyen");

    // Données structurées pour les emails (JSON)
    const aidesJson = JSON.stringify(aidesVisibles.map(a => ({
      nom:          a.nom,
      organisme:    a.organisme || "",
      montantLabel: a.montantLabel,
      niveau:       a.niveau,
      categorie:    a.categorie,
    })));

    const mpaLabel = mpa?.niveau === "fort"
      ? `Éligible — ${mpa.taux}`
      : mpa?.niveau === "moyen"
        ? `Probable — ${mpa.taux}`
        : "Non éligible MaPrimeAdapt'";

    const templateParams = {
      lead_nom:              data.nom,
      lead_telephone:        data.telephone,
      lead_email:            data.email,
      lead_source:           data.source || (data.isPartenaire ? "Partenaire" : "Non renseigné"),
      sim_age:               data.age === "70_plus" ? "70 ans ou plus" : data.age === "60_69" ? "60 à 69 ans" : "Moins de 60 ans",
      sim_objectif:          OBJECTIF_OPTIONS.find(o => o.value === data.objectif)?.label || data.objectif || "Non renseigné",
      sim_situation:         SITUATION_OPTIONS.find(o => o.value === data.situation)?.label || data.situation,
      sim_statut:            HOUSING_OPTIONS.find(o => o.value === data.statut)?.label || data.statut,
      sim_departement:       data.departement,
      sim_occupants:         data.occupants,
      sim_revenus:           getIncomeOptions(data.occupants, data.departement).find(o => o.value === data.revenus)?.label || data.revenus,
      sim_profil:            PROFIL_OPTIONS.find(o => o.value === data.profil)?.label || data.profil,
      sim_aides_json:        aidesJson,
      sim_nb_aides:          String(aidesEligibles.length),
      sim_total_logement:    totalLog > 0 ? `jusqu'à ${totalLog.toLocaleString("fr-FR")} €` : "",
      sim_eligibilite:       mpaLabel,
      timestamp:             new Date().toLocaleString("fr-FR"),
      to_email:              RECIPIENT_EMAIL,
      partenaire:            data.isPartenaire ? "oui" : "non",
      partenaire_entreprise: data.isPartenaire ? (data.partenaireEntreprise || "") : "",
      partenaire_nom:        data.isPartenaire ? (data.partenaireNom || "") : "",
      prec_ergo_rapport:     data.ergo_rapport || "—",
      prec_chute_hospi:      data.chute_hospi  || "—",
      prec_aidant:           data.aidant        || "—",
    };

    try {
      await fetch("/api/send-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(templateParams),
      });
    } catch (err) {
      console.error("Email error:", err);
    }

    setSending(false);
  };

  const goNext = () => {
    if (step === 7) { handleSubmit(); return; }
    if (canGoNext()) setStep(s => s + 1);
  };
  const goBack = () => setStep(s => Math.max(0, s - 1));
  const reset  = () => { setStep(0); setData({}); setErrors({}); setShowResults(false); setContactSubmitted(false); };

  // Enregistre les valeurs à l'entrée de chaque étape (évite faux positifs auto-advance au retour)
  useEffect(() => {
    const autoFields = { 0: "age", 2: "statut", 4: "revenus", 5: "profil", 6: "objectif" };
    const field = autoFields[step];
    stepEntryValue.current  = field ? (data[field] || null) : (step === 1 ? (data.situation || null) : null);
    stepEntryAidant.current = step === 1 ? (data.aidant || null) : null;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [step]);

  // Auto-avance — steps à choix unique (hors 1 et 3 qui ont leur propre logique)
  useEffect(() => {
    const autoFields = { 0: "age", 2: "statut", 4: "revenus", 5: "profil", 6: "objectif" };
    const field = autoFields[step];
    if (field && data[field] && data[field] !== stepEntryValue.current) {
      const t = setTimeout(() => setStep(s => s + 1), 380);
      return () => clearTimeout(t);
    }
  }, [data.age, data.statut, data.revenus, data.profil, data.objectif, step]);

  // Auto-avance étape 1 (Situation) :
  // - Prévention → dès que la situation est choisie
  // - Autres → seulement quand "aidant au quotidien" est répondu
  useEffect(() => {
    if (step !== 1) return;
    if (data.situation === "prevention" && data.situation !== stepEntryValue.current) {
      const t = setTimeout(() => setStep(s => s + 1), 380);
      return () => clearTimeout(t);
    }
    if (data.situation && data.situation !== "prevention" && data.aidant && data.aidant !== stepEntryAidant.current) {
      const t = setTimeout(() => setStep(s => s + 1), 380);
      return () => clearTimeout(t);
    }
  }, [data.situation, data.aidant, step]); // eslint-disable-line react-hooks/exhaustive-deps

  // Auto-avance step 3 (foyer) : dès que occupants est choisi ET département valide
  useEffect(() => {
    if (step !== 3) return;
    const deptValid = data.departement && /^(0[1-9]|[1-9][0-9]|2[AB]|97[1-6])$/i.test(data.departement);
    if (deptValid && data.occupants) {
      const t = setTimeout(() => setStep(s => s + 1), 380);
      return () => clearTimeout(t);
    }
  }, [data.occupants, data.departement, step]); // eslint-disable-line react-hooks/exhaustive-deps

  useEffect(() => {
    bodyRef.current?.scrollTo?.({ top: 0, behavior: "smooth" });
  }, [step, showResults]);

  const renderStep = () => {
    switch (step) {
      case 0: return <StepAge       data={data} onChange={onChange} />;
      case 1: return <StepSituation data={data} onChange={onChange} />;
      case 2: return <StepStatut    data={data} onChange={onChange} />;
      case 3: return <StepFoyer     data={data} onChange={onChange} />;
      case 4: return <StepRevenus   data={data} onChange={onChange} />;
      case 5: return <StepProfil    data={data} onChange={onChange} />;
      case 6: return <StepObjectif  data={data} onChange={onChange} />;
      case 7: return <StepContact   data={data} onChange={onChange} errors={errors} />;
      default: return null;
    }
  };

  return (
    <>
      <style>{`
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        * { box-sizing: border-box; }
        button:hover { opacity: 0.92; }
        input:focus, select:focus { border-color: #8F1349 !important; }
      `}</style>
      <div style={S.wrapper}>
        <div style={S.container}>

          <div style={S.header}>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "center" }}>
              <span style={{ fontFamily: "'DM Serif Display', serif", fontSize: 28, fontWeight: 400, color: "#8F1349", letterSpacing: "-0.01em" }}>Vivalea</span>
            </div>
            <div style={{ fontSize: 13, color: "#6B7280", marginTop: 6 }}>
              Simulateur d'aides — Maintien à domicile
            </div>
            <div style={S.badge}>Seniors · Handicap · Aidants · Gratuit · Confidentiel</div>
          </div>

          {!showResults && <ProgressBar step={step} />}

          <div style={S.body} ref={bodyRef} key={showResults ? "results" : step}>
            <div style={{ animation: "fadeIn 0.35s ease" }}>
              {showResults
                ? <ResultScreen
                    data={data}
                    onReset={reset}
                  />
                : renderStep()
              }
            </div>
            {!showResults && (
              <>
                <NavButtons
                  showBack={step > 0} onBack={goBack} onNext={goNext}
                  canGoNext={canGoNext()}
                  nextLabel={step === 7 ? "Voir mes aides →" : "Continuer"}
                />
                {step === 7 && (
                  <p style={{
                    fontSize: 11, color: "#9CA3AF", textAlign: "center",
                    marginTop: 8, lineHeight: 1.5, padding: "0 8px",
                  }}>
                    En cliquant sur « Voir mes aides », j'accepte que Vivalea utilise mes coordonnées
                    pour me recontacter au sujet de mes droits et des aides disponibles pour le maintien
                    à domicile. (Données traitées conformément au RGPD — aucune transmission à des tiers.)
                  </p>
                )}
              </>
            )}
          </div>

          <div style={S.footer}>
            <p style={S.footerText}>
              Vivalea · Entreprise à impact et ESS · Simulation indicative, non contractuelle.
              <br />Vos données sont traitées conformément au RGPD.
            </p>
          </div>
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SimulateurAides />);
  </script>
</body>
</html>
