<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulateur d'aides — Seniors &amp; Handicap · Vivalea</title>
  <meta name="description" content="Découvrez toutes vos aides pour adapter votre logement : MaPrimeAdapt', APA, PCH, crédit d'impôt, CARSAT… Simulation gratuite par Vivalea.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #F8F6F4; overflow-x: hidden; }
  </style>
  <script>
    // Auto-resize iframe — v2
    (function () {
      var lastHeight = 0;
      var MIN_HEIGHT = 600;
      function sendHeight() {
        var rootEl = document.getElementById('root');
        if (!rootEl) return;
        var h = Math.ceil(rootEl.getBoundingClientRect().height) + 60;
        if (h < MIN_HEIGHT) h = MIN_HEIGHT;
        if (Math.abs(h - lastHeight) > 12) {
          lastHeight = h;
          if (window.parent !== window) {
            window.parent.postMessage({ type: 'vivalea-resize', height: h }, '*');
          }
        }
      }
      var pollCount = 0;
      var pollInterval = setInterval(function () {
        var rootEl = document.getElementById('root');
        if (rootEl && rootEl.children.length > 0) {
          clearInterval(pollInterval);
          sendHeight();
          if (typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(sendHeight).observe(rootEl);
          }
        }
        if (++pollCount > 50) clearInterval(pollInterval);
      }, 100);
      window.addEventListener('DOMContentLoaded', sendHeight);
      window.addEventListener('load', function () { setTimeout(sendHeight, 500); });
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONSTANTS ────────────────────────────────────────────────

const STEPS = [
  { id: "age",         label: "Âge" },
  { id: "situation",   label: "Situation" },
  { id: "statut",      label: "Logement" },
  { id: "departement", label: "Dépt." },
  { id: "occupants",   label: "Foyer" },
  { id: "revenus",     label: "Revenus" },
  { id: "profil",      label: "Profil" },
  { id: "contact",     label: "Contact" },
];

const HOUSING_OPTIONS = [
  { value: "proprietaire_occupant", label: "Propriétaire occupant" },
  { value: "proprietaire_bailleur", label: "Propriétaire bailleur" },
  { value: "locataire_prive",       label: "Locataire d'un logement privé" },
  { value: "locataire_social",      label: "Locataire d'un logement social" },
  { value: "autre",                 label: "Autre / je ne sais pas" },
];

const SITUATION_OPTIONS = [
  { value: "perte_severe", label: "Perte d'autonomie importante",   hint: "GIR 1 à 4 — dépendance modérée à totale" },
  { value: "perte_legere", label: "Légère perte d'autonomie",        hint: "GIR 5-6 — autonomie globalement préservée" },
  { value: "handicap",     label: "Situation de handicap reconnue", hint: "Avec ou en cours de reconnaissance MDPH" },
  { value: "prevention",   label: "Prévention / anticipation",       hint: "Adapter le logement avant toute perte d'autonomie" },
];

const OCCUPANTS_OPTIONS = ["1", "2", "3", "4", "5", "6+"];

// ── BARÈME FRANCE RÉNOV' (revenus très modestes / modestes) ──
// Source : france-renov.gouv.fr/bareme
const IDF_DEPTS = ["75","77","78","91","92","93","94","95"];

const BAREME = {
  horsidf: {
    veryModest: [17363, 25393, 30540, 35676, 40835],
    modest:     [22259, 32553, 39148, 45735, 52348],
    incVM: 5151, incM: 6598,
  },
  idf: {
    veryModest: [24031, 35270, 42357, 49455, 56580],
    modest:     [29253, 42933, 51564, 60208, 68877],
    incVM: 7116, incM: 8663,
  },
};

function getRevenusThresholds(occupants, dep) {
  const b = IDF_DEPTS.includes(String(dep)) ? BAREME.idf : BAREME.horsidf;
  const raw = occupants === "6+" ? 6 : parseInt(occupants, 10) || 1;
  const idx  = Math.min(raw - 1, 4);
  const extra = raw > 5 ? raw - 5 : 0;
  return {
    veryModest: b.veryModest[idx] + extra * b.incVM,
    modest:     b.modest[idx]     + extra * b.incM,
  };
}

function getIncomeOptions(occupants, dep) {
  const { veryModest, modest } = getRevenusThresholds(occupants, dep);
  const fmtVM = veryModest.toLocaleString("fr-FR");
  const fmtM  = modest.toLocaleString("fr-FR");
  return [
    { value: "very_modest", label: `Inférieur à ${fmtVM} €` },
    { value: "modest",      label: `Entre ${fmtVM} € et ${fmtM} €` },
    { value: "above",       label: `Supérieur à ${fmtM} €` },
  ];
}

// Fallback pour affichages qui n'ont pas encore occupants/dep
const INCOME_OPTIONS = getIncomeOptions("1", "");

const PROFIL_OPTIONS = [
  { value: "retraite",      label: "Retraité(e)" },
  { value: "salarie",       label: "Salarié(e) — secteur privé" },
  { value: "fonctionnaire", label: "Fonctionnaire / secteur public" },
  { value: "autre",         label: "Autre / sans activité" },
];

const SOURCE_OPTIONS = [
  "Recherche Google", "Réseaux sociaux", "Bouche à oreille",
  "Professionnel de santé", "Mairie / CCAS", "Autre",
];

const NIVEAU_CONFIG = {
  fort:  { color: "#059669", bg: "#ECFDF5", label: "ÉLIGIBLE" },
  moyen: { color: "#E9552E", bg: "#FFF1E4", label: "PROBABLE" },
  info:  { color: "#3B82F6", bg: "#EFF6FF", label: "APPLICABLE" },
  non:   { color: "#9CA3AF", bg: "#F3F4F6", label: "NON ÉLIGIBLE" },
};

const RECIPIENT_EMAIL = "lea@vivalea.fr";

// ── AIDES LOCALES PAR DÉPARTEMENT ───────────────────────────

function getLocalAideInfo(dep) {
  const n = parseInt(dep, 10) || 0;

  if (dep === "75") return {
    organisms: "DASES · Paris Habitat",
    description: "La Ville de Paris propose une aide à l'adaptation via le dispositif PAPA (Programme d'Adaptation du logement des Personnes Agées). Cumulable avec les aides nationales.",
    contact: "dases.paris.fr · 01 40 28 40 28",
    montantLocal: "jusqu'à 10 000 €",
  };
  if ([77, 78, 91, 92, 93, 94, 95].includes(n)) return {
    organisms: "Conseil Départemental + Commune + ANAH locale",
    description: `Le département (${dep}) et les communes franciliennes disposent d'aides complémentaires pour l'adaptation du logement. Île-de-France Énergies accompagne aussi certains travaux.`,
    contact: "Votre CCAS communal · iledefrance-energies.fr",
    montantLocal: "Variable selon commune",
  };
  if (dep === "69") return {
    organisms: "Métropole de Lyon · Conseil Départemental du Rhône",
    description: "La Métropole de Lyon propose des aides à l'adaptation via son programme Réhabilitation Habitat, en complément des dispositifs nationaux.",
    contact: "grandlyon.com · rhone.fr",
    montantLocal: "jusqu'à 3 000 €",
  };
  if (dep === "13") return {
    organisms: "Métropole Aix-Marseille-Provence · PACT 13",
    description: "La Métropole AMP et le PACT 13 accompagnent les projets d'adaptation dans le cadre du programme local Habiter Mieux.",
    contact: "pact-amsm.org · metropoleapm.fr",
    montantLocal: "Variable",
  };
  if (dep === "59") return {
    organisms: "MEL (Métropole Europ. de Lille) · Conseil Dép. du Nord",
    description: "La MEL et le Département du Nord proposent des aides complémentaires pour l'adaptation du logement des seniors et personnes handicapées.",
    contact: "lillemetropole.fr · lenord.fr",
    montantLocal: "Variable",
  };
  if (dep === "33") return {
    organisms: "Bordeaux Métropole · Conseil Départemental Gironde",
    description: "Bordeaux Métropole et la Gironde accompagnent les projets d'adaptation en partenariat avec l'ANAH locale et les CCAS du territoire.",
    contact: "bordeaux-metropole.fr · gironde.fr",
    montantLocal: "Variable",
  };
  if (dep === "31") return {
    organisms: "Toulouse Métropole · Conseil Dép. Haute-Garonne",
    description: "Toulouse Métropole et le Département proposent des dispositifs complémentaires pour l'amélioration et l'adaptation du logement.",
    contact: "toulouse-metropole.fr · haute-garonne.fr",
    montantLocal: "Variable",
  };
  if (dep === "67") return {
    organisms: "Eurométropole de Strasbourg · ADIL 67",
    description: "L'Eurométropole de Strasbourg et l'ADIL 67 conseillent et accompagnent les projets d'adaptation du logement.",
    contact: "strasbourg.eu · adil67.org",
    montantLocal: "Variable",
  };
  if (dep === "06") return {
    organisms: "Métropole Nice Côte d'Azur · CRAM Prov.-Alpes",
    description: "La Métropole NCA propose des aides à l'amélioration de l'habitat pour les résidents âgés ou handicapés du territoire.",
    contact: "metropole.nice.fr",
    montantLocal: "Variable",
  };
  if (dep === "44") return {
    organisms: "Nantes Métropole Habitat · Conseil Dép. Loire-Atlantique",
    description: "Nantes Métropole et le Département proposent des aides à l'adaptation en complément des dispositifs nationaux.",
    contact: "nantesmetropole.fr · loire-atlantique.fr",
    montantLocal: "Variable",
  };
  if (dep === "38") return {
    organisms: "Grenoble Alpes Métropole · Conseil Dép. Isère",
    description: "La Métropole grenobloise et le Département disposent de programmes d'aide à l'adaptation et l'amélioration de l'habitat.",
    contact: "grenoble-alpes-metropole.fr · isere.fr",
    montantLocal: "Variable",
  };
  if (dep === "34") return {
    organisms: "Montpellier Méditerranée Métropole · Hérault",
    description: "La Métropole de Montpellier et le Département de l'Hérault proposent des aides complémentaires pour l'adaptation du logement.",
    contact: "montpellier3m.fr · herault.fr",
    montantLocal: "Variable",
  };
  if (dep === "76") return {
    organisms: "Métropole Rouen Normandie · Conseil Dép. Seine-Maritime",
    description: "La Métropole rouennaise accompagne l'adaptation du logement dans le cadre de son programme habitat.",
    contact: "metropole-rouen-normandie.fr",
    montantLocal: "Variable",
  };
  if (dep === "57") return {
    organisms: "Eurométropole de Metz · Moselle",
    description: "L'Eurométropole de Metz et le Conseil Départemental de la Moselle proposent des aides locales à l'adaptation.",
    contact: "eurometropole-metz.fr · moselle.fr",
    montantLocal: "Variable",
  };
  if (n >= 971 && n <= 976) return {
    organisms: "DEAL · ANAH Outre-Mer · Collectivité Territoriale",
    description: "Des aides spécifiques existent en Outre-Mer dans le cadre du programme LHI (Lutte contre l'Habitat Indigne) et des dispositifs des collectivités locales, avec des plafonds majorés.",
    contact: "Votre CCAS + Préfecture locale + CTM/CTG",
    montantLocal: "Aides majorées DOM",
  };
  // Fallback générique
  return {
    organisms: `Conseil Dép. ${dep} · Commune · CCAS · CAF`,
    description: `Des aides complémentaires peuvent exister dans votre département (${dep}) et votre commune. Le CCAS de votre mairie est le premier interlocuteur : il recense les dispositifs locaux disponibles.`,
    contact: "Votre CCAS de mairie + ANAH délégation territoriale (anah.fr)",
    montantLocal: "Variable selon commune",
  };
}

// ── MOTEUR D'ÉLIGIBILITÉ ─────────────────────────────────────

function computeAides(data) {
  const age60plus        = data.age === "60_plus";
  const situationSevere  = data.situation === "perte_severe";
  const situationLegere  = data.situation === "perte_legere";
  const isHandicap       = data.situation === "handicap";

  const isProprietaire   = data.statut === "proprietaire_occupant";
  const isLocatairePrive = data.statut === "locataire_prive";

  const revenusTresModeste = data.revenus === "very_modest";
  const revenusAudessus    = data.revenus === "above";

  const isRetraite = data.profil === "retraite";
  const isSalarie  = data.profil === "salarie";

  const aides = [];

  // 1. MaPrimeAdapt'
  if ((isProprietaire || isLocatairePrive) && !revenusAudessus) {
    const taux    = revenusTresModeste ? 70 : 50;
    const montant = revenusTresModeste ? 22000 : 14000;
    aides.push({
      id: "maprimeadapt", nom: "MaPrimeAdapt'", organisme: "ANAH / État",
      eligible: true, niveau: revenusTresModeste ? "fort" : "moyen",
      montantMax: montant,
      montantLabel: `jusqu'à ${montant.toLocaleString("fr-FR")} €`,
      taux: `${taux} % des travaux HT pris en charge`,
      description: `Aide nationale pour les travaux d'adaptation du logement. Prise en charge à ${taux} % du montant HT.`,
      condition: revenusTresModeste ? "Ménage à revenus très modestes (barème ANAH)" : "Ménage à revenus modestes (barème ANAH)",
    });
  } else {
    const raison = revenusAudessus
      ? "Revenus dépassant les plafonds ANAH"
      : `Statut "${HOUSING_OPTIONS.find(o => o.value === data.statut)?.label}" non éligible`;
    aides.push({
      id: "maprimeadapt", nom: "MaPrimeAdapt'", organisme: "ANAH / État",
      eligible: false, niveau: "non", montantMax: 0, montantLabel: "Non éligible",
      taux: "",
      description: "Réservée aux propriétaires occupants et locataires du parc privé avec revenus modestes.",
      condition: raison,
    });
  }

  // 2. APA — volet adaptation du logement
  if (age60plus && (situationSevere || situationLegere)) {
    const montant = situationSevere ? 7000 : 3500;
    aides.push({
      id: "apa", nom: "APA — Volet adaptation du logement", organisme: "Conseil Départemental",
      eligible: true, niveau: situationSevere ? "fort" : "moyen",
      montantMax: montant,
      montantLabel: `jusqu'à ${montant.toLocaleString("fr-FR")} €`,
      taux: "Selon GIR et revenus du bénéficiaire",
      description: "L'Aide Personnalisée d'Autonomie peut financer des travaux d'adaptation du logement en complément des autres aides.",
      condition: situationSevere ? "Perte d'autonomie GIR 1 à 4 — 60 ans ou plus" : "Perte d'autonomie GIR 5-6 — 60 ans ou plus",
    });
  }

  // 3. PCH — aménagement du logement
  if (isHandicap) {
    if (!age60plus) {
      aides.push({
        id: "pch", nom: "PCH — Aménagement du logement", organisme: "MDPH",
        eligible: true, niveau: "fort", montantMax: 10000,
        montantLabel: "jusqu'à 10 000 €",
        taux: "100 % des dépenses dans la limite du plafond",
        description: "La Prestation de Compensation du Handicap prend en charge les travaux d'accessibilité et d'adaptation du logement.",
        condition: "Reconnaissance MDPH — moins de 60 ans",
      });
    } else {
      aides.push({
        id: "pch", nom: "PCH — Maintien des droits après 60 ans", organisme: "MDPH",
        eligible: true, niveau: "moyen", montantMax: 10000,
        montantLabel: "jusqu'à 10 000 €",
        taux: "Si droits PCH ouverts avant 60 ans",
        description: "La PCH peut être maintenue après 60 ans si les droits ont été ouverts avant cet âge. À vérifier auprès de votre MDPH.",
        condition: "Handicap reconnu avant 60 ans — maintien à confirmer avec la MDPH",
      });
    }
  }

  // 4. Crédit d'impôt adaptation
  // Éligible : 60 ans ou plus, OU perte d'autonomie, OU handicap reconnu.
  // Pour "prévention" sans perte d'autonomie et moins de 60 ans : non applicable légalement.
  // En revanche, pour les revenus >plafonds ANAH (non éligibles MaPrimeAdapt') avec 60+/autonomie, c'est souvent l'aide principale.
  if (age60plus || situationSevere || situationLegere || isHandicap) {
    const estAlternativePrincipale = !((isProprietaire || isLocatairePrive) && !revenusAudessus);
    aides.push({
      id: "credit_impot", nom: "Crédit d'impôt adaptation", organisme: "Finances Publiques",
      eligible: true, niveau: estAlternativePrincipale ? "fort" : "moyen",
      montantMax: 2500,
      montantLabel: "jusqu'à 2 500 €",
      taux: "25 % des dépenses (plafond 5 000 € / personne)",
      description: estAlternativePrincipale
        ? "En l'absence de MaPrimeAdapt', le crédit d'impôt est une aide directe accessible à tous pour financer les équipements d'adaptation. Valable même pour les revenus élevés."
        : "Crédit d'impôt pour l'installation d'équipements spécialement conçus pour les personnes âgées ou handicapées.",
      condition: "Propriétaires et locataires imposables — aucune condition de revenus",
    });
  }

  // 5. TVA réduite (toujours applicable)
  aides.push({
    id: "tva", nom: "TVA à taux réduit — 5,5 %", organisme: "État",
    eligible: true, niveau: "info", montantMax: 0,
    montantLabel: "Économie sur la facture artisan",
    taux: "5,5 % au lieu de 10 % ou 20 %",
    description: "TVA réduite applicable sur les travaux d'adaptation pour personnes âgées ou handicapées. Appliquée directement par l'artisan.",
    condition: "Logement de plus de 2 ans — mention obligatoire sur le devis",
  });

  // 6. CARSAT / Caisse de retraite
  if (isRetraite) {
    aides.push({
      id: "carsat", nom: "Aide CARSAT / Caisse de retraite", organisme: "CARSAT · MSA · CNAV",
      eligible: true, niveau: "moyen", montantMax: 3500,
      montantLabel: "jusqu'à 3 500 €",
      taux: "Selon ressources et caisse de retraite",
      description: "Les caisses de retraite proposent des aides complémentaires pour l'adaptation du logement de leurs adhérents (surtout GIR 5-6).",
      condition: "Retraité(e) du régime général, agricole ou autre caisse",
    });
  }

  // 7. Action Logement
  if (isSalarie || isRetraite) {
    aides.push({
      id: "action_logement", nom: "Prêt Action Logement — 0 %", organisme: "Action Logement",
      eligible: true, niveau: "info", montantMax: 0,
      montantLabel: "Prêt jusqu'à 10 000 € (sans intérêts)",
      taux: "Prêt à taux zéro",
      description: "Prêt sans intérêts pour couvrir le reste à charge des travaux non subventionnés. Complément idéal aux aides directes.",
      condition: "Salarié(e) ou retraité(e) d'une entreprise du secteur privé",
    });
  }

  // 8. Aides locales & territoriales (détail par département)
  const localInfo = getLocalAideInfo(data.departement || "");
  aides.push({
    id: "aides_locales", nom: "Aides locales & territoriales",
    organisme: localInfo.organisms,
    eligible: true, niveau: "info", montantMax: 0,
    montantLabel: localInfo.montantLocal,
    taux: "Complémentaires aux aides nationales",
    description: localInfo.description,
    condition: `Contact : ${localInfo.contact}`,
  });

  // Total des subventions directes (fort + moyen, hors prêts et TVA)
  const totalSubventions = aides
    .filter(a => a.eligible && (a.niveau === "fort" || a.niveau === "moyen"))
    .reduce((s, a) => s + a.montantMax, 0);

  return { aides, totalSubventions };
}

// ── STYLES ──────────────────────────────────────────────────

const S = {
  wrapper: {
    fontFamily: "'DM Sans', 'Segoe UI', sans-serif",
    background: "#F8F6F4",
    display: "flex", alignItems: "flex-start", justifyContent: "center",

  optionsGrid: (cols = 1) => ({

  }),
  radio: (selected) => ({

    border: `1.5px solid ${selected ? "#8F1349" : "#E8E2DD"}`,
    display: "flex", alignItems: "center", justifyContent: "center",
    flexShrink: 0, marginTop: 1, transition: "all 0.2s ease",

  radioDot: { width: 9, height: 9, borderRadius: "50%", background: "#8F1349" },
  input: {

function ProgressBar({ step }) {
  return (
    <>
      <div style={S.progressBar}>
        {STEPS.map((s, i) => (
          <React.Fragment key={s.id}>
            <div style={S.progressDot(i === step, i < step)} />
            {i < STEPS.length - 1 && <div style={S.progressLine(i < step)} />}
          </React.Fragment>
        ))}
      </div>
      <div style={S.progressLabels}>
        {STEPS.map((s, i) => (
          <div key={s.id} style={S.progressLabel(i === step || i < step)}>{s.label}</div>
        ))}
      </div>
    </>
  );
}

function OptionButton({ label, hint, selected, onClick, center }) {
  return (
    <button
      onClick={onClick}
      style={{ ...S.optionBtn(selected), ...(center ? { justifyContent: "center" } : {}) }}
      onMouseEnter={e => { if (!selected) e.currentTarget.style.borderColor = "#6B7280"; }}
      onMouseLeave={e => { if (!selected) e.currentTarget.style.borderColor = "#E8E2DD"; }}
    >
      <div style={S.radio(selected)}>
        {selected && <div style={S.radioDot} />}
      </div>
      <div>
        <div>{label}</div>
        {hint && <div style={{ fontSize: 12, color: "#6B7280", fontWeight: 400, marginTop: 2 }}>{hint}</div>}
      </div>
    </button>
  );
}

function NavButtons({ onBack, onNext, canGoNext, showBack, nextLabel = "Continuer" }) {
  return (
    <div style={S.navRow}>
      {showBack ? <button style={S.backBtn} onClick={onBack}>← Retour</button> : <div />}
      <button style={S.nextBtn(!canGoNext)} onClick={onNext} disabled={!canGoNext}>
        {nextLabel} →
      </button>
    </div>
  );
}

// Carte hero MaPrimeAdapt' (pleine largeur, mise en avant)
function MaPrimeAdaptHero({ aide, allAides }) {
  const cfg = NIVEAU_CONFIG[aide.niveau] || NIVEAU_CONFIG.non;
  const isEligible = aide.niveau === "fort" || aide.niveau === "moyen";
  const taux = aide.niveau === "fort" ? "70 %" : aide.niveau === "moyen" ? "50 %" : null;

  // Montage alternatif : top 3 aides par montant décroissant quand non éligible
  const topAlternatives = !isEligible
    ? (allAides || [])
        .filter(a => a.id !== "maprimeadapt" && a.eligible && (a.niveau === "fort" || a.niveau === "moyen"))
        .sort((a, b) => b.montantMax - a.montantMax)
        .slice(0, 3)
    : [];
  const totalAlternatif = topAlternatives.reduce((s, a) => s + a.montantMax, 0);

  return (
    <div style={{
      border: `2px solid ${isEligible ? cfg.color : "#E8E2DD"}`,
      borderRadius: 14, padding: "18px 20px", marginBottom: 14,
      background: isEligible ? cfg.bg : "#F9FAFB",
    }}>
      {/* Badge + label */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
        <span style={{
          fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase",
          background: cfg.color, color: "#fff", padding: "3px 8px", borderRadius: 4,
        }}>{cfg.label}</span>
        <span style={{ fontSize: 10, color: "#6B7280", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase" }}>
          Aide principale · MaPrimeAdapt'
        </span>
      </div>

      {/* Corps */}
      <div style={{ textAlign: "center" }}>
        <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 22, color: "#18263F", lineHeight: 1.2, marginBottom: 2, display: "inline-flex", alignItems: "center", gap: 4 }}>
          MaPrimeAdapt'
          <TooltipInfo aideId="maprimeadapt" />
        </div>
        <div style={{ fontSize: 11, color: "#8F1349", fontWeight: 700, marginBottom: 8 }}>ANAH / État</div>
        <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.5, textAlign: "left", marginBottom: isEligible ? 12 : 4 }}>
          {aide.description}
        </div>
        {!isEligible && (
          <div style={{ fontSize: 11, color: "#9CA3AF", fontStyle: "italic", textAlign: "left" }}>{aide.condition}</div>
        )}
      </div>

      {isEligible && (
        <div style={{ textAlign: "center", marginTop: 4 }}>
          <div style={{
            width: 88, height: 88, borderRadius: "50%",
            background: cfg.color, display: "inline-flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center",
            boxShadow: `0 6px 18px ${cfg.color}50`,
          }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: "#fff", lineHeight: 1, fontFamily: "'DM Serif Display', serif" }}>{taux}</div>
            <div style={{ fontSize: 9, color: "rgba(255,255,255,0.85)", letterSpacing: "0.05em" }}>prise en charge</div>
          </div>
          <div style={{ fontSize: 15, fontWeight: 700, color: cfg.color, marginTop: 8 }}>
            {aide.montantLabel}
          </div>
          {aide.taux && <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 2 }}>{aide.taux}</div>}
        </div>
      )}

      {/* Montage alternatif (non-éligibles seulement) */}
      {!isEligible && topAlternatives.length > 0 && (
        <div style={{
          marginTop: 14, background: "#F0FDF4",
          border: "1.5px solid #86EFAC", borderRadius: 10, padding: "12px 14px",
        }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#059669", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>
            Montage alternatif recommandé
          </div>
          <div style={{ fontSize: 12, color: "#18263F", marginBottom: 10, lineHeight: 1.5 }}>
            Sans MaPrimeAdapt', vous pouvez combiner ces aides{totalAlternatif > 0 ? ` pour un potentiel de jusqu'à ${totalAlternatif.toLocaleString("fr-FR")} €` : ""} :
          </div>
          {topAlternatives.map((a, i) => {
            const c = NIVEAU_CONFIG[a.niveau];
            return (
              <div key={a.id} style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                paddingTop: i > 0 ? 7 : 0, marginTop: i > 0 ? 7 : 0,
                borderTop: i > 0 ? "1px solid #D1FAE5" : "none",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <span style={{ fontSize: 12, color: "#059669" }}>✓</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: "#18263F" }}>{a.nom}</span>
                </div>
                <span style={{ fontSize: 12, fontWeight: 700, color: c.color, whiteSpace: "nowrap" }}>{a.montantLabel}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  if (!text) return null;
  return (
    <span style={{ position: "relative", display: "inline-flex", alignItems: "center", marginLeft: 4, verticalAlign: "middle" }}>
      <button
        onMouseEnter={() => setShow(true)}
        onMouseLeave={() => setShow(false)}
        onClick={e => { e.stopPropagation(); setShow(s => !s); }}
        style={{
          border: "none", background: "none", cursor: "pointer",
          padding: 0, lineHeight: 1,
          color: light ? "rgba(255,255,255,0.65)" : "#9CA3AF",
          display: "inline-flex", alignItems: "center",
        }}
      >
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <circle cx="12" cy="8" r="0.5" fill="currentColor"/>
        </svg>
      </button>
      {show && (
        <span style={{
          position: "absolute", bottom: "calc(100% + 6px)", right: 0,
          background: "#1F2937", color: "#F9FAFB",
          fontSize: 11, lineHeight: 1.5, padding: "8px 11px",
          borderRadius: 8, width: 220, zIndex: 200,
          boxShadow: "0 4px 16px rgba(0,0,0,0.3)",
          pointerEvents: "none", textAlign: "left",
          whiteSpace: "normal", wordBreak: "keep-all",
        }}>
          {text}
        </span>
      )}
    </span>
  );
}

// Carte compacte pour la grille 2 colonnes
function AideCardCompact({ aide }) {
  const cfg = NIVEAU_CONFIG[aide.niveau] || NIVEAU_CONFIG.info;
  const shortDesc = aide.description.length > 88
    ? aide.description.substring(0, 86) + "…"
    : aide.description;

  return (
    <div style={{
      border: `1px solid ${cfg.color + "30"}`,
      borderTop: `3px solid ${cfg.color}`,
      borderRadius: 10, padding: "12px 13px",
      background: "#FFFFFF", display: "flex", flexDirection: "column", gap: 4,
      minHeight: 140,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{
          fontSize: 8, fontWeight: 700, letterSpacing: "0.1em",
          background: cfg.bg, color: cfg.color,
          padding: "2px 6px", borderRadius: 3,
        }}>{cfg.label}</span>
        <TooltipInfo aideId={aide.id} />
      </div>
      <div style={{ fontSize: 13, fontWeight: 700, color: "#18263F", lineHeight: 1.3 }}>{aide.nom}</div>
      <div style={{ fontSize: 10, color: "#8F1349", fontWeight: 600 }}>{aide.organisme}</div>
      <div style={{ fontSize: 11, color: "#6B7280", lineHeight: 1.45, flexGrow: 1 }}>{shortDesc}</div>
      <div style={{
        marginTop: "auto", paddingTop: 6, borderTop: `1px solid ${cfg.color}20`,
        textAlign: "center",
      }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: cfg.color }}>{aide.montantLabel}</div>
        {aide.taux && <div style={{ fontSize: 10, color: "#9CA3AF", marginTop: 1 }}>{aide.taux}</div>}
      </div>
    </div>
  );
}

// Carte non-éligible compacte (liste simple)
function AideCardNon({ aide }) {
  const cfg = NIVEAU_CONFIG.non;
  return (
    <div style={{
      display: "flex", justifyContent: "space-between", alignItems: "center",
      padding: "8px 12px", borderRadius: 8, background: "#F9FAFB",
      border: "1px solid #E8E2DD", marginBottom: 6,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{
          fontSize: 8, fontWeight: 700, background: cfg.bg, color: cfg.color,
          padding: "2px 5px", borderRadius: 3, flexShrink: 0,
        }}>NON ÉLIGIBLE</span>
        <span style={{ fontSize: 12, color: "#6B7280" }}>{aide.nom}</span>
        <TooltipInfo aideId={aide.id} />
      </div>
      <span style={{ fontSize: 11, color: "#9CA3AF", fontStyle: "italic", textAlign: "right", maxWidth: "45%" }}>{aide.condition}</span>
    </div>
  );
}

function ResultScreen({ data, onReset }) {
  const { aides, totalSubventions } = computeAides(data);

  const mpa            = aides.find(a => a.id === "maprimeadapt");
  const autresEligibles = aides.filter(a => a.id !== "maprimeadapt" && a.eligible && a.niveau !== "non");
  const nonEligibles   = aides.filter(a => !a.eligible || a.niveau === "non");
  const nbSubventions  = aides.filter(a => a.eligible && (a.niveau === "fort" || a.niveau === "moyen")).length;

  // Découpe en paires pour la grille 2 colonnes
  const paires = [];
  for (let i = 0; i < autresEligibles.length; i += 2) {
    paires.push(autresEligibles.slice(i, i + 2));
  }

  return (
    <div style={{ animation: "fadeIn 0.5s ease" }}>

      {/* ── Bannière total ── */}
      <div style={{
        background: "linear-gradient(135deg, #8F1349 0%, #6B0D37 100%)",
        borderRadius: 14, padding: "18px 20px", marginBottom: 14,
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
      }}>
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontSize: 9, color: "rgba(255,255,255,0.7)", fontWeight: 600, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 6 }}>
            Potentiel subventions directes estimées
          </div>
          <div style={{ fontSize: 30, fontWeight: 800, color: "#FFFFFF", lineHeight: 1, fontFamily: "'DM Serif Display', Georgia, serif" }}>
            {totalSubventions > 0 ? `jusqu'à ${totalSubventions.toLocaleString("fr-FR")} €` : "Aides disponibles"}
          </div>
          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.55)", marginTop: 7, lineHeight: 1.4, padding: "0 8px" }}>
            Estimation indicative, non contractuelle. Les montants réels dépendent de l'instruction du dossier par les organismes compétents.
          </div>
        </div>
        <div style={{ textAlign: "center", flexShrink: 0 }}>
          <div style={{
            width: 56, height: 56, borderRadius: "50%",
            background: "rgba(255,255,255,0.15)", border: "2px solid rgba(255,255,255,0.4)",
            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", lineHeight: 1 }}>{nbSubventions}</div>
            <div style={{ fontSize: 8, color: "rgba(255,255,255,0.75)", letterSpacing: "0.04em" }}>aides</div>
          </div>
        </div>
      </div>

      {/* ── Profil récap ── */}
      <div style={{ background: "#F8F6F4", borderRadius: 10, padding: "10px 14px", marginBottom: 14 }}>
        <div style={{ fontSize: 9, fontWeight: 700, color: "#8F1349", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 8, textAlign: "center" }}>
          Votre profil
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "5px 10px" }}>
          {[
            { label: "Âge",       value: data.age === "60_plus" ? "60 ans ou +" : "Moins de 60 ans" },
            { label: "Situation", value: SITUATION_OPTIONS.find(o => o.value === data.situation)?.label },
            { label: "Logement",  value: HOUSING_OPTIONS.find(o => o.value === data.statut)?.label },
            { label: "Revenus",   value: getIncomeOptions(data.occupants, data.departement).find(o => o.value === data.revenus)?.label },
            { label: "Profil",    value: PROFIL_OPTIONS.find(o => o.value === data.profil)?.label },
            { label: "Département", value: data.departement },
          ].filter(r => r.value).map((r, i) => (
            <div key={i} style={{ fontSize: 11, background: "#fff", borderRadius: 6, padding: "5px 8px" }}>
              <div style={{ fontSize: 9, color: "#9CA3AF", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 1 }}>{r.label}</div>
              <div style={{ fontWeight: 600, color: "#18263F", lineHeight: 1.3 }}>{r.value}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── MaPrimeAdapt' en vedette ── */}
      {mpa && <MaPrimeAdaptHero aide={mpa} allAides={aides} />}

      {/* ── Autres aides en grille 2 colonnes ── */}
      {paires.length > 0 && (
        <>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#18263F", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8, textAlign: "center" }}>
            Autres aides identifiées
          </div>
          {paires.map((paire, i) => (
            <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
              {paire.map(aide => <AideCardCompact key={aide.id} aide={aide} />)}
            </div>
          ))}
        </>
      )}

      {/* ── Non éligibles ── */}
      {nonEligibles.length > 0 && (
        <div style={{ marginTop: 10 }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>
            Non applicable dans votre situation
          </div>
          {nonEligibles.map(aide => <AideCardNon key={aide.id} aide={aide} />)}
        </div>
      )}

      {/* ── CTA ── */}
      <div style={{
        background: "#F8F6F4", borderRadius: 10, padding: "14px 16px",
        marginTop: 14, borderLeft: "4px solid #8F1349",
      }}>
        <p style={{ fontSize: 13, color: "#18263F", lineHeight: 1.6, margin: 0, fontWeight: 500 }}>
          Un conseiller Vivalea vous accompagne gratuitement pour monter votre dossier et maximiser votre financement.
        </p>
      </div>

      <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8 }}>
        <div style={{ fontSize: 11, color: "#6B7280", textAlign: "center" }}>
          Email récapitulatif envoyé à <strong style={{ color: "#18263F" }}>{data.email}</strong>
        </div>
        <button onClick={onReset} style={{ ...S.backBtn, width: "100%", textAlign: "center" }}>
          Nouvelle simulation
        </button>
      </div>
    </div>
  );
}

// ── OVERLAY ENVOI ────────────────────────────────────────────

function ConfirmationOverlay({ visible }) {
  if (!visible) return null;
  return (
    <div style={S.confirmOverlay}>
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#8F1349" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ marginBottom: 14 }}>
        <path d="M22 2L11 13" /><path d="M22 2L15 22L11 13L2 9L22 2Z" />
      </svg>
      <h3 style={{ ...S.question, fontSize: 18 }}>Calcul en cours…</h3>
      <p style={{ color: "#6B7280", fontSize: 13 }}>Nous préparons votre bilan d'aides personnalisé.</p>
    </div>
  );
}

// ── MAIN APP ────────────────────────────────────────────────

function SimulateurAides() {
  const [step,      setStep]      = useState(0);
  const [data,      setData]      = useState({});
  const [errors,    setErrors]    = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [sending,   setSending]   = useState(false);
  const bodyRef = useRef(null);
  // Valeur du champ auto-advance au moment où l'on entre dans l'étape.
  // L'auto-avance ne se déclenche QUE si la valeur a changé depuis l'entrée.
  const stepEntryValue = useRef(null);

  const onChange = (field, value) => {
    setData(prev => ({ ...prev, [field]: value }));
    setErrors(prev => ({ ...prev, [field]: undefined }));
  };

  const canGoNext = () => {
    switch (step) {
      case 0: return !!data.age;
      case 1: return !!data.situation;
      case 2: return !!data.statut;
      case 3: return data.departement && /^(0[1-9]|[1-9][0-9]|2[AB]|97[1-6])$/i.test(data.departement);
      case 4: return !!data.occupants;
      case 5: return !!data.revenus;
      case 6: return !!data.profil;
      case 7: return !!data.nom && !!data.telephone && !!data.email && (data.isPartenaire || !!data.source);
      default: return false;
    }
  };

  const validateContact = () => {
    const errs = {};
    if (!data.nom?.trim())       errs.nom       = "Ce champ est obligatoire.";
    if (!data.telephone?.trim()) {
      errs.telephone = "Ce champ est obligatoire.";
    } else {
      const _t = data.telephone.trim().replace(/[\s.\-()+]/g, "");
      // Accepte : 06/07XXXXXXXX · +336/+337XXXXXXXX · 00336/00337XXXXXXXX
      if (!/^(?:0033|33)?0?[67]\d{8}$/.test(_t)) errs.telephone = "Merci de saisir un numéro de portable (06 ou 07).";
    }
    if (!data.email?.trim())     errs.email     = "Ce champ est obligatoire.";
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) errs.email = "Email invalide.";
    if (!data.isPartenaire && !data.source) errs.source = "Ce champ est obligatoire.";
    if (data.isPartenaire) {
      if (!data.partenaireEntreprise?.trim()) errs.partenaireEntreprise = "Ce champ est obligatoire.";
      if (!data.partenaireNom?.trim())        errs.partenaireNom        = "Ce champ est obligatoire.";
    }
    return errs;
  };

  const handleSubmit = async () => {
    const errs = validateContact();
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }

    setSending(true);
    const { aides, totalSubventions } = computeAides(data);
    const aidesEligibles = aides.filter(a => a.eligible && a.niveau !== "non");
    const aidesListStr   = aidesEligibles.map(a => `${a.nom} (${a.montantLabel})`).join(" | ");
    const mpa = aides.find(a => a.id === "maprimeadapt");
    const mpaLabel = mpa?.niveau === "fort" ? "Éligible (très modeste)" : mpa?.niveau === "moyen" ? "Éligible (modeste)" : "Non éligible MaPrimeAdapt'";

    const templateParams = {
      lead_nom:          data.nom,
      lead_telephone:    data.telephone,
      lead_email:        data.email,
      lead_source:       data.source || "Non renseigné",
      sim_age:           data.age === "60_plus" ? "60 ans ou plus" : "Moins de 60 ans",
      sim_situation:     SITUATION_OPTIONS.find(o => o.value === data.situation)?.label || data.situation,
      sim_statut:        HOUSING_OPTIONS.find(o => o.value === data.statut)?.label || data.statut,
      sim_departement:   data.departement,
      sim_occupants:     data.occupants,
      sim_revenus:       getIncomeOptions(data.occupants, data.departement).find(o => o.value === data.revenus)?.label || data.revenus,
      sim_profil:        PROFIL_OPTIONS.find(o => o.value === data.profil)?.label || data.profil,
      sim_aides:         aidesListStr,
      sim_nb_aides:      String(aides.filter(a => a.eligible && (a.niveau === "fort" || a.niveau === "moyen")).length),
      sim_montant_total: totalSubventions > 0
        ? `jusqu'à ${totalSubventions.toLocaleString("fr-FR")} €` : "À estimer",
      sim_eligibilite:   mpaLabel, // rétrocompatibilité
      timestamp:         new Date().toLocaleString("fr-FR"),
      to_email:          RECIPIENT_EMAIL,
      partenaire:        data.isPartenaire ? "oui" : "non",
      partenaire_entreprise: data.isPartenaire ? (data.partenaireEntreprise || "") : "",
      partenaire_nom:    data.isPartenaire ? (data.partenaireNom || "") : "",
      // Précisions situation (facultatif)
      prec_ergo_rapport: data.ergo_rapport || "—",
      prec_chute_hospi:  data.chute_hospi  || "—",
      prec_aidant:       data.aidant        || "—",
    };

    try {
      await fetch("/api/send-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(templateParams),
      });
    } catch (err) {
      console.error("Email error:", err);
    }

    setSending(false);
    setSubmitted(true);
  };

  const goNext = () => {
    if (step === 7) { handleSubmit(); return; }
    if (canGoNext()) setStep(s => s + 1);
  };
  const goBack  = () => setStep(s => Math.max(0, s - 1));
  const reset   = () => { setStep(0); setData({}); setErrors({}); setSubmitted(false); };

  // Enregistre la valeur du champ à l'entrée de chaque étape
  // (doit être déclaré AVANT l'effet d'auto-avance pour garantir l'ordre d'exécution React)
  useEffect(() => {
    const autoFields = { 0: "age", 2: "statut", 4: "occupants", 5: "revenus", 6: "profil" };
    const field = autoFields[step];
    stepEntryValue.current = field ? (data[field] || null) : null;
  }, [step]); // eslint-disable-line react-hooks/exhaustive-deps

  // Auto-avance UNIQUEMENT si la sélection est nouvelle (différente de la valeur à l'entrée)
  useEffect(() => {
    const autoFields = { 0: "age", 2: "statut", 4: "occupants", 5: "revenus", 6: "profil" };
    const field = autoFields[step];
    if (field && data[field] && data[field] !== stepEntryValue.current) {
      const t = setTimeout(() => setStep(s => s + 1), 380);
      return () => clearTimeout(t);
    }
  }, [data.age, data.situation, data.statut, data.occupants, data.revenus, data.profil, step]);

  useEffect(() => {
    bodyRef.current?.scrollTo?.({ top: 0, behavior: "smooth" });
  }, [step]);

  const renderStep = () => {
    if (submitted) return <ResultScreen data={data} onReset={reset} />;
    switch (step) {
      case 0: return <StepAge         data={data} onChange={onChange} />;
      case 1: return <StepSituation   data={data} onChange={onChange} />;
      case 2: return <StepStatut      data={data} onChange={onChange} />;
      case 3: return <StepDepartement data={data} onChange={onChange} />;
      case 4: return <StepOccupants   data={data} onChange={onChange} />;
      case 5: return <StepRevenus     data={data} onChange={onChange} />;
      case 6: return <StepProfil      data={data} onChange={onChange} />;
      case 7: return <StepContact     data={data} onChange={onChange} errors={errors} />;
      default: return null;
    }
  };

  return (
    <>
      <style>{`
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        * { box-sizing: border-box; }
        button:hover { opacity: 0.92; }
        input:focus, select:focus { border-color: #8F1349 !important; }
      `}</style>
      <div style={S.wrapper}>
        <div style={S.container}>
          <ConfirmationOverlay visible={sending} />

          <div style={S.header}>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "center" }}>
              <span style={{ fontFamily: "'DM Serif Display', serif", fontSize: 28, fontWeight: 400, color: "#8F1349", letterSpacing: "-0.01em" }}>Vivalea</span>
            </div>
            <div style={{ fontSize: 13, color: "#6B7280", marginTop: 6 }}>
              Simulateur d'aides — Seniors &amp; Handicap
            </div>
            <div style={S.badge}>Gratuit · Sans engagement · Confidentiel</div>
          </div>

          {!submitted && <ProgressBar step={step} />}

          <div style={S.body} ref={bodyRef} key={step}>
            <div style={{ animation: "fadeIn 0.35s ease" }}>
              {renderStep()}
            </div>
            {!submitted && (
              <NavButtons
                showBack={step > 0} onBack={goBack} onNext={goNext}
                canGoNext={canGoNext()}
                nextLabel={step === 7 ? "Découvrir mes aides" : "Continuer"}
              />
            )}
          </div>

          <div style={S.footer}>
            <p style={S.footerText}>
              Vivalea · Entreprise à impact et ESS · Simulation indicative, non contractuelle.
              <br />Vos données sont traitées de manière confidentielle.
            </p>
          </div>
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SimulateurAides />);
  </script>
</body>
