      const validate = (st) => {

        const csrdL=r.scoreCsrd>=60?"Maturité avancée":r.scoreCsrd>=30?"En progression":"Vulnérabilité élevée";

          <div style={s.stepSub}>Ces réponses déterminent votre score de préparation à la CSRD (pilier social, normes ESRS S1).</div>
          <div style={s.fg}><label style={s.label}>Vos managers sont-ils formés à identifier et orienter un salarié aidant ?</label><div style={s.radioGroup}>{MANAGER_OPTIONS.map(o=><div key={o.value} style={rOpt(data.cultureManager===o.value)} onClick={()=>update("cultureManager",o.value)}><div style={rDot(data.cultureManager===o.value)}>{data.cultureManager===o.value&&<div style={rDotIn}/>}</div>{o.label}</div>)}</div>{errors.cultureManager&&<div style={s.err}>{errors.cultureManager}</div>}</div>
          <div style={s.fg}><label style={s.label}>Quels outils proposez-vous déjà ?</label><div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:8}}>{DISPOSITIFS.map(o=><div key={o.value} style={rOpt(data.dispositifs.includes(o.value))} onClick={()=>toggleD(o.value)}><div style={cBox(data.dispositifs.includes(o.value))}>{data.dispositifs.includes(o.value)&&<CheckIcon/>}</div><span style={{fontSize:13}}>{o.label}</span></div>)}</div>{errors.dispositifs&&<div style={s.err}>{errors.dispositifs}</div>}</div>
          <div style={s.fg}><label style={s.label}>Mesurez-vous l'impact de vos actions sociales sur vos KPI financiers ? <span style={s.sublabel}>(normes ESRS S1)</span></label><div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:8}}>{PILOTAGE_OPTIONS.map(o=><div key={o.value} style={rOpt(data.pilotageData===o.value)} onClick={()=>update("pilotageData",o.value)}><div style={rDot(data.pilotageData===o.value)}>{data.pilotageData===o.value&&<div style={rDotIn}/>}</div>{o.label==="Oui"?"Oui":"Non"}</div>)}</div>{errors.pilotageData&&<div style={s.err}>{errors.pilotageData}</div>}</div>
          <div style={s.fg}><label style={s.label}>Quelles mesures d'impact RSE / CSRD avez-vous mises en place ?</label><div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:8}}>{MESURES_CSRD.map(o=><div key={o.value} style={rOpt(data.mesuresCsrd.includes(o.value))} onClick={()=>toggleM(o.value)}><div style={cBox(data.mesuresCsrd.includes(o.value))}>{data.mesuresCsrd.includes(o.value)&&<CheckIcon/>}</div><span style={{fontSize:13}}>{o.label}</span></div>)}<div style={rOpt(data.mesuresCsrd.includes("autre"))} onClick={()=>toggleM("autre")}><div style={cBox(data.mesuresCsrd.includes("autre"))}>{data.mesuresCsrd.includes("autre")&&<CheckIcon/>}</div>Autre</div></div>{data.mesuresCsrd.includes("autre")&&<input style={{...s.input,marginTop:8}} placeholder="Précisez votre mesure d'impact…" value={data.mesuresCsrdAutre} onChange={e=>update("mesuresCsrdAutre",e.target.value)}/>}</div>
          <div style={s.fg}><label style={s.label}>Avez-vous un partenariat avec des crèches pour vos salariés parents ?</label><div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:8}}>{[{value:"oui",label:"Oui"},{value:"non",label:"Non"}].map(o=><div key={o.value} style={rOpt(data.contratCreche===o.value)} onClick={()=>update("contratCreche",o.value)}><div style={rDot(data.contratCreche===o.value)}>{data.contratCreche===o.value&&<div style={rDotIn}/>}</div>{o.label}</div>)}</div></div>
          <div style={s.navRow}><button style={s.btnS} onClick={goBack}>← Retour</button><button style={{...s.btnP(false),flex:1}} onClick={goNext}>Continuer →</button></div>
        </div>,
        /* P5 */
        <div style={s.card} key="s4">
          {stepTag(5,"Votre diagnostic")}
          <div style={s.stepTitle}>Dernière étape</div>
          <div style={s.stepSub}>Renseignez votre email professionnel pour recevoir votre rapport CODIR personnalisé de 3 pages : calcul de ROI, score CSRD et plan d'action.</div>
          <div style={s.fg}><label style={s.label}>Votre email professionnel</label><input style={s.input} type="email" placeholder="prenom.nom@entreprise.fr" value={data.email} onChange={e=>update("email",e.target.value)}/>{errors.email&&<div style={s.err}>{errors.email}</div>}</div>
          <div style={{padding:"14px 16px",background:COLORS.greenLight,borderRadius:12,marginBottom:20,fontSize:12,color:COLORS.navy,lineHeight:1.6}}><strong style={{color:COLORS.green}}>Confidentialité garantie</strong><br/>Vos données sont traitées de manière strictement confidentielle et ne seront jamais communiquées à des tiers. Ce diagnostic est un outil d'aide à la décision, pas un engagement.</div>
          <div style={s.navRow}><button style={s.btnS} onClick={goBack}>← Retour</button><button style={{...s.btnP(sending),flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={goNext} disabled={sending}>{sending?<><span style={{display:"inline-block",width:16,height:16,border:"2px solid #fff4",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.6s linear infinite"}}/>Génération en cours...</>:"Générer mon Diagnostic →"}</button></div>
        </div>,
      ];

      return (
        <div style={{...s.container,maxWidth:step===3&&!isMobile?780:580,transition:"max-width 0.3s ease"}} ref={cardRef}>
          <div style={s.header}><div style={s.logoBar}><span style={s.logoText}>Vivalea</span><span style={s.tagline}>Care</span></div><div style={s.badge}>Diagnostic CSRD 2026 · Gratuit · Confidentiel</div></div>
          <ProgressBar step={step} total={5}/>
          {steps[step]}
          <div style={s.footer}>Vivalea · Entreprise à impact et ESS · Simulation indicative, non contractuelle.<br/>Vos données sont traitées de manière confidentielle.</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
